<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול תקציב משותף</title>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; }
        .container { max-width: 500px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn { border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; margin-top: 10px; }
        .category-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 12px; border: 1px solid #f1f5f9; }
        .progress-bar { background: #f1f5f9; height: 10px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.6s ease; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 20px; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none !important; }
        .fab-container { position: fixed; bottom: 20px; left: 20px; right: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="authSection" class="card" style="margin-top: 50px; text-align: center;">
        <h2>💎 ברוכים הבאים</h2>
        <input type="email" id="email" placeholder="אימייל" value="wekax2004@gmail.com">
        <input type="password" id="pass" placeholder="סיסמה">
        <button class="btn btn-primary" onclick="handleLogin()">התחבר</button>
        <button onclick="handleSignup()" style="background:none; border:none; color:var(--primary); margin-top:15px; cursor:pointer; text-decoration:underline;">הרשמת משתמש חדש</button>
    </div>

    <div id="mainApp" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="margin:0;">התקציב שלנו ✨</h2>
            <button onclick="auth.signOut().then(()=>location.reload())" style="background:#eee; border:none; padding:8px 12px; border-radius:10px;">יציאה</button>
        </div>
        <div id="categoriesList"></div>
        <div class="card">
            <h3 style="margin-bottom:10px; font-size:18px;">פעולות אחרונות</h3>
            <div id="historyList"></div>
        </div>
        <div class="fab-container">
            <button class="btn" style="background:#e2e8f0; color:#475569;" onclick="openModal('catModal')">➕ קטגוריה</button>
            <button class="btn btn-success" onclick="openModal('expModal')">💸 הוצאה</button>
        </div>
    </div>
</div>

<div id="expModal" class="modal"><div class="modal-content">
    <h3>הוצאה חדשה</h3>
    <input type="number" id="expAmount" placeholder="סכום ב-₪">
    <select id="catSelect"></select>
    <button class="btn btn-primary" onclick="saveExp()">שמור</button>
    <button class="btn" style="background:none;" onclick="closeModal('expModal')">ביטול</button>
</div></div>

<div id="catModal" class="modal"><div class="modal-content">
    <h3>קטגוריה חדשה</h3>
    <input type="text" id="catName" placeholder="שם הקטגוריה">
    <input type="number" id="catBudget" placeholder="תקציב חודשי ₪">
    <button class="btn btn-primary" onclick="saveCat()">שמור</button>
    <button class="btn" style="background:none;" onclick="closeModal('catModal')">ביטול</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, Timestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU", authDomain: "expensetrackerpro-d216d.firebaseapp.com", projectId: "expensetrackerpro-d216d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const myGroupId = "Mishpacha_2025_VIP";

    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';

    window.handleLogin = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("שגיאה בכניסה"));
    window.handleSignup = () => createUserWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("שגיאה בהרשמה"));

    onAuthStateChanged(auth, u => {
        if(u) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            startSync();
        }
    });

    function startSync() {
        onSnapshot(query(collection(db, "categories"), where("groupId", "==", myGroupId)), s => {
            const cats = s.docs.map(d => ({id:d.id, ...d.data()}));
            onSnapshot(query(collection(db, "transactions"), where("groupId", "==", myGroupId), orderBy("date", "desc"), limit(10)), ts => {
                const txs = ts.docs.map(d => d.data());
                renderCats(cats, txs);
                document.getElementById('catSelect').innerHTML = cats.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                renderHistory(txs);
            });
        });
    }

    function renderCats(cats, txs) {
        document.getElementById('categoriesList').innerHTML = cats.map(c => {
            const spent = txs.filter(t => t.catId === c.id).reduce((sum, t) => sum + t.amount, 0);
            const pct = Math.min((spent / c.budget) * 100, 100);
            return `<div class="category-card">
                <div style="display:flex; justify-content:space-between;"><strong>${c.name}</strong> <span>₪${spent} / ₪${c.budget}</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%; background:${pct > 90 ? 'var(--danger)' : 'var(--primary)'}"></div></div>
            </div>`;
        }).join('');
    }

    function renderHistory(txs) {
        document.getElementById('historyList').innerHTML = txs.map(t => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #eee;"><span>${t.catName}</span> <strong>₪${t.amount}</strong></div>`).join('');
    }

    window.saveCat = async () => {
        await addDoc(collection(db, "categories"), { name: catName.value, budget: parseFloat(catBudget.value), groupId: myGroupId });
        closeModal('catModal');
    };

    window.saveExp = async () => {
        const catNameSelected = catSelect.options[catSelect.selectedIndex].text;
        await addDoc(collection(db, "transactions"), { amount: parseFloat(expAmount.value), catId: catSelect.value, catName: catNameSelected, groupId: myGroupId, date: Timestamp.now() });
        closeModal('expModal');
    };
</script>
</body>
</html>
