<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <title>BudgetMaster Pro</title>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; --gift: #ec4899; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; direction: rtl; color: #1e293b; min-height: 100vh; font-size: 16px; }
        
        .container { max-width: 1200px; margin: auto; }
        .hidden { display: none !important; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; }
        .header-section h2 { margin: 0; font-weight: 900; font-size: 1.2rem; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 10px; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 350px 1fr 300px; } }
        
        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); margin-bottom: 15px; }
        
        .section-title { font-size: 1rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .category-card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px; border: 1px solid #f1f5f9; position: relative; }
        
        .progress-bg { background: #f1f5f9; height: 8px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.6s ease; }
        
        .btn { border: none; padding: 14px; border-radius: 14px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; width: 100%; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); }
        .btn-danger { background: var(--danger); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 15px; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 100%; max-width: 400px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 16px; background: #f8fafc; }
        
        /* היסטוריה מותאמת לסלולר */
        .item-row { background: #fff; padding: 12px; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 8px; }
        .item-main { display: flex; justify-content: space-between; align-items: center; }
        .item-actions { display: flex; gap: 15px; justify-content: flex-end; padding-top: 5px; }
        .action-btn { background: #f1f5f9; border: none; padding: 8px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
        .btn-edit { color: var(--primary); }
        .btn-delete { color: var(--danger); }

        .share-header { background: var(--primary); color: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: center; font-size: 0.9rem; }
        .add-btn { background: var(--primary); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h2>התקציב שלי 💎</h2>
        <button id="logoutBtn" class="hidden" style="color:red; border:none; background:none; font-weight:bold;">יציאה</button>
    </div>

    <div id="authSection" class="card">
        <h3 style="text-align:center; color:var(--primary);">ברוכים הבאים</h3>
        <input type="text" id="groupCode" placeholder="🔑 קוד שיתוף משפחתי">
        <input type="email" id="email" placeholder="📧 אימייל">
        <input type="password" id="pass" placeholder="🔒 סיסמה">
        <button class="btn btn-primary" id="loginBtn">התחברות / יצירה</button>
    </div>

    <div id="mainApp" class="hidden">
        <div class="share-header" id="displayGroup"></div>
        <div class="dashboard-grid">
            
            <div class="card">
                <div class="section-title">📜 היסטוריה אחרונה</div>
                <div id="historyList"></div>
            </div>

            <div>
                <button class="btn btn-primary" id="openCatModalBtn" style="margin-bottom: 15px;">➕ קטגוריה חדשה</button>
                <div id="categoriesList"></div>
            </div>

            <div class="card" style="border-top: 4px solid var(--gift);">
                <div class="section-title">🎁 גיפטקארדים <button id="openGiftModalBtn" class="add-btn">+</button></div>
                <div id="giftCardsList"></div>
            </div>
        </div>
    </div>
</div>

<div id="expModal" class="modal"><div class="modal-content">
    <h3 id="expTitle">הוצאה</h3>
    <input type="number" id="expAmount" placeholder="סכום ב-₪" style="font-size: 20px; font-weight: bold; text-align: center;">
    <select id="paymentMethod"></select>
    <textarea id="expNotes" placeholder="הערות..."></textarea>
    <input type="hidden" id="activeCatId">
    <button class="btn btn-primary" id="btnSaveTx">💾 שמור</button>
    <button class="btn" style="background:none; color:gray;" onclick="closeM('expModal')">ביטול</button>
</div></div>

<div id="catModal" class="modal"><div class="modal-content">
    <h3>קטגוריה חדשה</h3>
    <input type="text" id="catName" placeholder="שם הקטגוריה">
    <input type="number" id="catBudget" placeholder="תקציב חודשי ₪">
    <button class="btn btn-primary" id="btnSaveCat">💾 שמור</button>
    <button class="btn" style="background:none; color:gray;" onclick="closeM('catModal')">ביטול</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, updateDoc, doc, deleteDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU", authDomain: "expensetrackerpro-d216d.firebaseapp.com", projectId: "expensetrackerpro-d216d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let activeGid = localStorage.getItem('familyCode') || "";
    let allCats = [], allTxs = [], allGifts = [];

    window.openM = (id) => document.getElementById(id).style.display = 'flex';
    window.closeM = (id) => document.getElementById(id).style.display = 'none';

    // חיבור
    document.getElementById('loginBtn').onclick = async () => {
        const mail = document.getElementById('email').value, p = document.getElementById('pass').value, code = document.getElementById('groupCode').value;
        if (!code || !mail || !p) return alert("מלא הכל");
        activeGid = code; localStorage.setItem('familyCode', code);
        try { await signInWithEmailAndPassword(auth, mail, p); }
        catch (e) { try { await createUserWithEmailAndPassword(auth, mail, p); } catch (err) { alert(err.message); } }
    };

    document.getElementById('logoutBtn').onclick = () => { signOut(auth); localStorage.removeItem('familyCode'); location.reload(); };

    onAuthStateChanged(auth, u => {
        if(u && activeGid) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('displayGroup').innerText = "📍 קוד: " + activeGid;
            sync();
        }
    });

    function sync() {
        onSnapshot(query(collection(db, "categories"), where("groupId", "==", activeGid)), s => { allCats = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
        onSnapshot(query(collection(db, "transactions"), where("groupId", "==", activeGid)), s => { allTxs = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => (b.date?.seconds || 0) - (a.date?.seconds || 0)); render(); });
    }

    // פעולות
    window.deleteTx = async (id) => { if(confirm('למחוק?')) await deleteDoc(doc(db, "transactions", id)); };
    
    window.editTx = async (id) => {
        const tx = allTxs.find(t => t.id === id);
        const val = prompt("סכום חדש:", tx.amount);
        if(val) await updateDoc(doc(db, "transactions", id), { amount: parseFloat(val) });
    };

    window.deleteCat = async (id) => { if(confirm('מחיקת קטגוריה תמחק הכל בה. להמשיך?')) await deleteDoc(doc(db, "categories", id)); };

    document.getElementById('openCatModalBtn').onclick = () => openM('catModal');
    
    document.getElementById('btnSaveCat').onclick = async () => {
        const n = document.getElementById('catName').value, b = document.getElementById('catBudget').value;
        await addDoc(collection(db, "categories"), { name: n, budget: parseFloat(b), groupId: activeGid });
        closeM('catModal');
    };

    window.openExpModal = (id, name) => {
        document.getElementById('activeCatId').value = id;
        document.getElementById('expTitle').innerText = name;
        document.getElementById('paymentMethod').innerHTML = `<option value="אשראי">💳 אשראי</option><option value="מזומן">💵 מזומן</option>`;
        openM('expModal');
    };

    document.getElementById('btnSaveTx').onclick = async () => {
        const a = document.getElementById('expAmount').value;
        await addDoc(collection(db, "transactions"), { 
            amount: parseFloat(a), 
            catId: document.getElementById('activeCatId').value, 
            method: document.getElementById('paymentMethod').value,
            groupId: activeGid,
            date: Timestamp.now()
        });
        closeM('expModal');
    };

    function render() {
        // רנדור קטגוריות
        document.getElementById('categoriesList').innerHTML = allCats.map(c => {
            const spent = allTxs.filter(t => t.catId === c.id).reduce((s,t) => s + t.amount, 0);
            const pct = Math.min((spent / c.budget) * 100, 100);
            return `<div class="category-card">
                <div onclick="openExpModal('${c.id}','${c.name}')">
                    <div style="display:flex; justify-content:space-between"><strong>${c.name}</strong><span>₪${spent} / ₪${c.budget}</span></div>
                    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:${pct > 90 ? 'red' : 'green'}"></div></div>
                </div>
                <button onclick="deleteCat('${c.id}')" style="position:absolute; top:10px; left:10px; background:none; border:none; opacity:0.3;">🗑️</button>
            </div>`;
        }).join('');

        // רנדור היסטוריה - מותאם לסלולר
        document.getElementById('historyList').innerHTML = allTxs.slice(0, 20).map(t => {
            const cat = allCats.find(c => c.id === t.catId);
            return `<div class="item-row">
                <div class="item-main">
                    <div><strong>${cat ? cat.name : 'כללי'}</strong><br><small>${t.method}</small></div>
                    <strong style="color:var(--danger); font-size:1.1rem;">₪${t.amount}</strong>
                </div>
                <div class="item-actions">
                    <button class="action-btn btn-edit" onclick="editTx('${t.id}')">✏️ ערוך</button>
                    <button class="action-btn btn-delete" onclick="deleteTx('${t.id}')">🗑️ מחק</button>
                </div>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
