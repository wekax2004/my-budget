<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ניהול תקציב משותף Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; --gift: #ec4899; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; direction: rtl; }
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; display: flex; align-items: center; justify-content: center; gap: 5px; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: white; border: 1px solid var(--primary); color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .category-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 15px; border: 2px solid transparent; }
        .progress-container { background: #f1f5f9; height: 10px; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.8s ease; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 15px; }
        .modal-content { background: white; padding: 20px; border-radius: 24px; width: 100%; max-width: 400px; }
        .history-item { padding: 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
    </style>
</head>
<body>

<div id="authSection" class="card" style="max-width: 400px; margin: 60px auto; text-align: center;">
    <h2 id="authTitle">התחברות למערכת</h2>
    <input type="email" id="email" placeholder="אימייל">
    <input type="password" id="pass" placeholder="סיסמה">
    <input type="text" id="groupCode" placeholder="קוד קבוצה משותף (למשל: Family2025)">
    <small style="display:block; margin-bottom:10px; color:#64748b;">* כל מי שיזין את אותו הקוד יראה את אותם הנתונים</small>
    
    <button class="btn btn-primary" id="loginBtn">התחבר</button>
    <button class="btn btn-outline" id="signupBtn">צור חשבון חדש</button>
</div>

<div id="mainApp" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h3>התקציב של קבוצת <span id="displayGroup"></span> 💎</h3>
        <button onclick="location.reload()" style="background:none; border:none; cursor:pointer;">🔄 התנתק</button>
    </div>

    <div id="categoriesList"></div>
    
    <div class="card">
        <strong>היסטוריה (חודש נוכחי)</strong>
        <div id="historyList"></div>
    </div>

    <div style="position:fixed; bottom:20px; left:20px; right:20px; display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <button class="btn btn-primary" onclick="openAddCat()">➕ קטגוריה</button>
        <button class="btn btn-primary" style="background:var(--success)" onclick="openAddExp()">💸 הוצאה</button>
    </div>
</div>

<div id="genericModal" class="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU", authDomain: "expensetrackerpro-d216d.firebaseapp.com", projectId: "expensetrackerpro-d216d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let myGroupId = localStorage.getItem('lastGroupCode') || "";
    if(myGroupId) document.getElementById('groupCode').value = myGroupId;

    // הרשמה
    document.getElementById('signupBtn').onclick = async () => {
        const code = document.getElementById('groupCode').value;
        if(!code) return alert("חובה להזין קוד קבוצה!");
        try {
            await createUserWithEmailAndPassword(auth, email.value, pass.value);
            localStorage.setItem('lastGroupCode', code);
            location.reload();
        } catch(e) { alert("שגיאה בהרשמה: " + e.message); }
    };

    // התחברות
    document.getElementById('loginBtn').onclick = async () => {
        const code = document.getElementById('groupCode').value;
        if(!code) return alert("חובה להזין קוד קבוצה!");
        try {
            await signInWithEmailAndPassword(auth, email.value, pass.value);
            localStorage.setItem('lastGroupCode', code);
            myGroupId = code;
        } catch(e) { alert("שגיאה בהתחברות: " + e.message); }
    };

    onAuthStateChanged(auth, u => {
        if(u && myGroupId) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('displayGroup').innerText = myGroupId;
            startSync();
        }
    });

    function startSync() {
        // כאן נכנסות פונקציות ה-onSnapshot שלך עם ה-where("groupId", "==", myGroupId)
        // המערכת תמשוך נתונים רק של הקבוצה שהוזנה בתיבת הטקסט
        console.log("מסנכרן נתונים עבור קבוצה:", myGroupId);
    }
</script>
</body>
</html>
