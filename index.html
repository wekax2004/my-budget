<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BudgetMaster</title>
    <style>
        body { font-family: sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 20px; direction: rtl; }
        .card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; background: #6366f1; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="card" id="loginBox">
    <h2>ברוכים הבאים 💎</h2>
    <input type="email" id="userEmail" placeholder="אימייל" value="wekax2004@gmail.com">
    <input type="password" id="userPass" placeholder="סיסמה">
    <button class="btn" id="goBtn">התחברות</button>
    <p id="msg" style="color: red; font-size: 14px; margin-top: 10px;"></p>
</div>

<div id="appBox" class="hidden">
    <div class="card">
        <h3>התחברת בהצלחה! 🎉</h3>
        <p>טוען את התקציב שלך...</p>
        <button class="btn" onclick="location.reload()">צא מהחשבון</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU", 
        authDomain: "expensetrackerpro-d216d.firebaseapp.com", 
        projectId: "expensetrackerpro-d216d" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // האזנה למצב חיבור - אם כבר מחובר, העבר למסך הראשי
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('appBox').classList.remove('hidden');
        }
    });

    // חיבור ישיר לכפתור
    const btn = document.getElementById('goBtn');
    btn.onclick = function() {
        const email = document.getElementById('userEmail').value;
        const pass = document.getElementById('userPass').value;
        const msg = document.getElementById('msg');

        msg.style.color = "blue";
        msg.innerText = "מנסה להתחבר...";

        signInWithEmailAndPassword(auth, email, pass)
            .then(() => {
                msg.innerText = "";
            })
            .catch((error) => {
                msg.style.color = "red";
                msg.innerText = "שגיאה: " + error.message;
                console.error(error);
            });
    };
</script>
</body>
</html>
