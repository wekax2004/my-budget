<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BudgetMaster Pro</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#6366f1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --primary: #6366f1;
      --bg: #f8fafc;
      --danger: #ef4444;
      --success: #22c55e;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 15px;
      direction: rtl;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,.05);
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      margin-top: 5px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      margin: 8px 0;
      box-sizing: border-box;
      font-size: 16px;
    }
    #mainApp { display: none; }
    .tx-item {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid #f1f5f9;
    }
    /* תיקון הגובה של הגרף - זה יפתור את הבעיה מהתמונה */
    .chart-container {
      position: relative;
      height: 220px;
      width: 100%;
      margin: 0 auto;
    }
    #authErr { color: var(--danger); text-align: center; font-size: 14px; margin-top: 10px; }
  </style>
</head>

<body>

<div id="authScreen" class="card" style="max-width: 400px; margin: 50px auto;">
  <h2 style="text-align:center">💎 BudgetMaster</h2>
  <input id="email" type="email" placeholder="אימייל">
  <input id="pass" type="password" placeholder="סיסמה">
  <button class="btn" id="loginBtn">התחברות</button>
  <button class="btn" style="background:#94a3b8" id="signupBtn">הרשמה</button>
  <p id="authErr"></p>
</div>

<div id="mainApp">
  <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
    <h3 id="hello" style="margin:0"></h3>
    <button id="logoutBtn" style="color:var(--danger); background:none; border:none; cursor:pointer; font-weight:bold;">התנתק</button>
  </div>

  <div class="card">
    <h3 style="margin-top:0">📊 סיכום הוצאות</h3>
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3 style="margin-top:0">➕ הוספת הוצאה</h3>
    <input id="note" placeholder="מה קנית?">
    <input id="amount" type="number" placeholder="סכום ב-₪">
    <button class="btn" id="addTxBtn">שמור הוצאה</button>
  </div>

  <div class="card">
    <h3 style="margin-top:0">📜 היסטוריה אחרונה</h3>
    <div id="txList"></div>
  </div>
</div>

<script type="module">
  // ייבוא פונקציות פיירבייס - חייב להיות בראש הסקריפט
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU",
    authDomain: "expensetrackerpro-d216d.firebaseapp.com",
    projectId: "expensetrackerpro-d216d"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // אלמנטים
  const authScreen = document.getElementById("authScreen");
  const mainApp    = document.getElementById("mainApp");
  const emailEl    = document.getElementById("email");
  const passEl     = document.getElementById("pass");
  const authErr    = document.getElementById("authErr");
  const hello      = document.getElementById("hello");
  const txList     = document.getElementById("txList");
  const noteEl     = document.getElementById("note");
  const amountEl   = document.getElementById("amount");
  const chartCanvas= document.getElementById("chart");

  let user  = null;
  let txs   = [];
  let chart = null;

  // פונקציות כניסה/הרשמה
  async function handleAuth(type) {
    authErr.innerText = "";
    try {
      if (type === "login") {
        await signInWithEmailAndPassword(auth, emailEl.value, passEl.value);
      } else {
        await createUserWithEmailAndPassword(auth, emailEl.value, passEl.value);
      }
    } catch (e) {
      authErr.innerText = "שגיאה: " + e.message;
    }
  }

  document.getElementById("loginBtn").onclick = () => handleAuth("login");
  document.getElementById("signupBtn").onclick = () => handleAuth("signup");
  document.getElementById("logoutBtn").onclick = () => signOut(auth);

  // האזנה למצב המשתמש
  onAuthStateChanged(auth, u => {
    if (u) {
      user = u;
      authScreen.style.display = "none";
      mainApp.style.display = "block";
      hello.innerText = "שלום, " + u.email.split('@')[0];
      startSync();
    } else {
      user = null;
      authScreen.style.display = "block";
      mainApp.style.display = "none";
    }
  });

  // סנכרון נתונים
  function startSync() {
    const q = query(collection(db, "transactions"), where("user", "==", user.email), orderBy("date", "desc"));
    onSnapshot(q, snap => {
      txs = snap.docs.map(d => d.data());
      updateUI();
    });
  }

  // הוספת הוצאה
  async function addTx() {
    const amount = parseFloat(amountEl.value);
    if (!amount || amount <= 0) return;

    await addDoc(collection(db, "transactions"), {
      note: noteEl.value || "הוצאה כללית",
      amount: amount,
      user: user.email,
      date: Timestamp.now()
    });

    noteEl.value = "";
    amountEl.value = "";
  }
  document.getElementById("addTxBtn").onclick = addTx;

  // עדכון הממשק (רשימה וגרף)
  function updateUI() {
    // רשימה
    txList.innerHTML = txs.slice(0, 10).map(t => `
      <div class="tx-item">
        <span>${t.note}</span>
        <b>₪${t.amount.toLocaleString()}</b>
      </div>
    `).join("");

    const total = txs.reduce((s, t) => s + t.amount, 0);

    // גרף
    if (chart) chart.destroy();
    chart = new Chart(chartCanvas, {
      type: "doughnut",
      data: {
        labels: ["הוצאות"],
        datasets: [{
          data: [total],
          backgroundColor: ['#6366f1'],
          borderWidth: 0
        }]
      },
      options: {
        maintainAspectRatio: false,
        plugins: {
          legend: { display: true, position: 'bottom' }
        }
      }
    });
  }
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js");
    });
  }
</script>

</body>
</html>
