<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BudgetMaster Pro 2025</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; --gift: #ec4899; --savings: #0ea5e9; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; color: #1e293b; }
        .container { max-width: 1300px; margin: auto; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 320px 1fr 320px; align-items: start; } }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); height: fit-content; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .category-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #f1f5f9; cursor: pointer; }
        .progress-bg { background: #f1f5f9; height: 8px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.6s ease; }
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .btn { border: none; padding: 14px; border-radius: 16px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); }
        .btn-gift { background: var(--gift); }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f8fafc; cursor: pointer; }
        .badge { font-size: 0.75rem; padding: 3px 8px; border-radius: 8px; background: #f1f5f9; color: #64748b; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(6px); padding: 15px; }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 420px; box-sizing: border-box; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 16px; box-sizing: border-box; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
        <h2 style="margin:0; font-weight: 900;">התקציב שלי 💎</h2>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer;">יציאה</button>
    </div>

    <div id="authSection" class="card" style="max-width: 380px; margin: 60px auto; text-align: center;">
        <h3>כניסה</h3>
        <input type="email" id="email" placeholder="אימייל" value="wekax2004@gmail.com">
        <input type="password" id="pass" placeholder="סיסמה">
        <button class="btn btn-primary" style="width:100%" id="loginBtn">התחברות</button>
    </div>

    <div id="mainApp" class="hidden">
        <div class="dashboard-grid">
            
            <div class="card">
                <div class="section-title">
                    <span>📜 היסטוריה</span>
                    <select id="monthFilter" style="width: auto; padding: 5px; margin: 0; font-size: 13px;" onchange="render()">
                        <option value="all">כל הזמן</option>
                        <option value="current">חודש נוכחי</option>
                    </select>
                </div>
                <div id="historyList"></div>
            </div>

            <div>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="openCatModal('expense')">➕ קטגוריה</button>
                    <button class="btn btn-gift" onclick="openCatModal('savings')">💰 יעד חיסכון</button>
                </div>
                <div id="categoriesList"></div>
            </div>

            <div>
                <div class="card" style="margin-bottom: 20px; border-top: 4px solid var(--gift);">
                    <div class="section-title">
                        <span>🎁 ארנק גיפטקארד</span>
                        <button onclick="openM('giftModal')" style="border:none; background:none; font-size:20px; cursor:pointer;">+</button>
                    </div>
                    <div id="giftCardsList"></div>
                </div>
                <div class="card" style="margin-bottom: 20px;">
                    <div class="section-title"><span>📊 פילוח תשלומים</span></div>
                    <div style="height: 200px;"><canvas id="methodChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="expModal" class="modal"><div class="modal-content">
    <h3 id="expTitle">פעולה חדשה</h3>
    <div style="background: #f1f5f9; padding: 10px; border-radius: 15px; margin-bottom: 10px;">
        <label style="font-size: 12px; font-weight: bold;">מחשבון המרה (לא חובה):</label>
        <div style="display: flex; gap: 5px;">
            <input type="number" id="foreignAmount" placeholder="סכום במט"ח" oninput="convertCurrency()">
            <select id="currencyType" onchange="convertCurrency()" style="width: 100px;">
                <option value="3.72">USD $</option>
                <option value="4.05">EUR €</option>
            </select>
        </div>
    </div>
    <input type="number" id="expAmount" placeholder="סכום סופי ב-₪" style="font-weight: bold; border: 2px solid var(--primary);">
    <select id="paymentMethod"></select> <textarea id="expNotes" placeholder="הערות..."></textarea>
    <input type="hidden" id="activeCatId">
    <button class="btn btn-primary" style="width:100%" id="btnSaveTx">שמור פעולה</button>
    <button onclick="closeM('expModal')" style="background:none; border:none; color:gray; width:100%; margin-top:10px; cursor:pointer;">ביטול</button>
</div></div>

<div id="catModal" class="modal"><div class="modal-content">
    <h3>הגדרת קטגוריה</h3>
    <input type="text" id="catName" placeholder="שם הקטגוריה">
    <input type="number" id="catBudget" placeholder="תקציב ₪">
    <input type="hidden" id="catTypeHidden">
    <button class="btn btn-primary" style="width:100%" id="btnSaveCat">שמור</button>
    <button onclick="closeM('catModal')" style="background:none; border:none; color:gray; width:100%; margin-top:10px; cursor:pointer;">ביטול</button>
</div></div>

<div id="giftModal" class="modal"><div class="modal-content">
    <h3>הוספת גיפטקארד לארנק</h3>
    <input type="text" id="giftName" placeholder="שם הכרטיס (למשל: BuyMe)">
    <input type="number" id="giftBalance" placeholder="סכום טעון ₪">
    <button class="btn btn-gift" style="width:100%" id="btnSaveGift">שמור בארנק</button>
    <button onclick="closeM('giftModal')" style="background:none; border:none; color:gray; width:100%; margin-top:10px; cursor:pointer;">ביטול</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, updateDoc, doc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU", authDomain: "expensetrackerpro-d216d.firebaseapp.com", projectId: "expensetrackerpro-d216d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const gid = "mishpacha_2025_final";
    
    let allCats = [], allTxs = [], allGifts = [], chart = null;

    window.openM = (id) => document.getElementById(id).style.display = 'flex';
    window.closeM = (id) => document.getElementById(id).style.display = 'none';

    // פונקציית המרה
    window.convertCurrency = () => {
        const foreign = parseFloat(document.getElementById('foreignAmount').value) || 0;
        const rate = parseFloat(document.getElementById('currencyType').value);
        document.getElementById('expAmount').value = Math.round(foreign * rate);
    };

    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, email.value, pass.value);
    onAuthStateChanged(auth, u => { if(u) { authSection.classList.add('hidden'); mainApp.classList.remove('hidden'); sync(); } });

    function sync() {
        onSnapshot(query(collection(db, "categories"), where("groupId", "==", gid)), s => { allCats = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
        onSnapshot(query(collection(db, "transactions"), where("groupId", "==", gid)), s => { allTxs = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => b.date - a.date); render(); });
        onSnapshot(query(collection(db, "giftcards"), where("groupId", "==", gid)), s => { allGifts = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
    }

    window.openCatModal = (type) => { catTypeHidden.value = type; openM('catModal'); };
    document.getElementById('btnSaveCat').onclick = async () => {
        await addDoc(collection(db, "categories"), { name: catName.value, budget: parseFloat(catBudget.value), type: catTypeHidden.value, groupId: gid });
        closeM('catModal');
    };

    window.openExpModal = (catId, catNameStr) => {
        activeCatId.value = catId;
        expTitle.innerText = "הוספה ל: " + catNameStr;
        
        // בניית רשימת אמצעי תשלום כולל גיפטקארדים
        let opts = `<option value="אשראי">💳 אשראי</option><option value="מזומן">💵 מזומן</option>`;
        allGifts.forEach(g => {
            opts += `<option value="gift_${g.id}">🎁 ${g.name} (₪${g.balance})</option>`;
        });
        document.getElementById('paymentMethod').innerHTML = opts;
        openM('expModal');
    };

    document.getElementById('btnSaveTx').onclick = async () => {
        const amt = parseFloat(expAmount.value);
        const meth = document.getElementById('paymentMethod').value;
        const cat = allCats.find(c => c.id === activeCatId.value);
        
        // עדכון יתרה אם זה גיפטקארד
        if(meth.startsWith('gift_')) {
            const gId = meth.split('_')[1];
            const g = allGifts.find(x => x.id === gId);
            await updateDoc(doc(db, "giftcards", gId), { balance: g.balance - amt });
        }

        await addDoc(collection(db, "transactions"), { 
            amount: amt, catId: activeCatId.value, catName: cat.name, 
            method: meth, notes: expNotes.value, groupId: gid, date: Timestamp.now() 
        });
        closeM('expModal');
    };

    document.getElementById('btnSaveGift').onclick = async () => {
        await addDoc(collection(db, "giftcards"), { name: giftName.value, balance: parseFloat(giftBalance.value), groupId: gid });
        closeM('giftModal');
    };

    function render() {
        const filter = document.getElementById('monthFilter').value;
        const now = new Date();
        
        const filteredTxs = allTxs.filter(t => {
            if (filter === 'all') return true;
            const tDate = t.date.toDate();
            return tDate.getMonth() === now.getMonth() && tDate.getFullYear() === now.getFullYear();
        });

        categoriesList.innerHTML = allCats.map(c => {
            const spent = filteredTxs.filter(t => t.catId === c.id).reduce((s,t) => s + t.amount, 0);
            const pct = Math.min((spent / c.budget) * 100, 100);
            return `<div class="category-card" onclick="openExpModal('${c.id}', '${c.name}')">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${c.name}</strong>
                    <span>₪${spent} / ₪${c.budget}</span>
                </div>
                <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:${pct > 90 ? 'var(--danger)' : 'var(--success)'}"></div></div>
            </div>`;
        }).join('');

        historyList.innerHTML = filteredTxs.slice(0, 10).map(t => `
            <div class="item-row">
                <div><strong>${t.catName}</strong><br><span class="badge">${t.method.includes('gift') ? '🎁 גיפטקארד' : t.method}</span></div>
                <div style="color:var(--danger); font-weight:bold;">₪${t.amount}</div>
            </div>`).join('');

        giftCardsList.innerHTML = allGifts.map(g => `
            <div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed #eee;">
                <span>${g.name}</span><strong>₪${g.balance}</strong>
            </div>`).join('') || 'אין כרטיסים';

        if(chart) chart.destroy();
        const counts = {}; filteredTxs.forEach(t => { 
            const label = t.method.includes('gift') ? '🎁 גיפטקארד' : t.method;
            counts[label] = (counts[label] || 0) + t.amount; 
        });
        chart = new Chart(document.getElementById('methodChart'), { 
            type: 'doughnut', 
            data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#6366f1', '#fbbf24', '#22c55e', '#ec4899'] }] },
            options: { maintainAspectRatio: false }
        });
    }
</script>
</body>
</html>
