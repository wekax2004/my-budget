<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BudgetMaster Pro</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#6366f1">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --primary:#6366f1;
      --bg:#f8fafc;
      --danger:#ef4444;
    }
    body {
      font-family: system-ui, sans-serif;
      background:var(--bg);
      margin:0;
      padding:15px;
    }
    .card {
      background:#fff;
      border-radius:20px;
      padding:20px;
      margin-bottom:15px;
      box-shadow:0 4px 15px rgba(0,0,0,.05);
    }
    .btn {
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      background:var(--primary);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }
    input {
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #e5e7eb;
      margin:6px 0;
    }
    #mainApp { display:none; }
    .tx {
      display:flex;
      justify-content:space-between;
      padding:10px;
      border-bottom:1px solid #eee;
    }
  </style>
</head>

<body>

<!-- AUTH -->
<div id="authScreen" class="card">
  <h2 style="text-align:center">💎 BudgetMaster</h2>
  <input id="email" type="email" placeholder="אימייל">
  <input id="pass" type="password" placeholder="סיסמה">
  <button class="btn" id="loginBtn">התחברות</button>
  <button class="btn" style="background:#94a3b8" id="signupBtn">הרשמה</button>
  <p id="authErr" style="color:red;text-align:center"></p>
</div>

<!-- APP -->
<div id="mainApp">
  <div class="card">
    <h3 id="hello"></h3>
    <button id="logoutBtn" style="color:red;background:none;border:none">התנתק</button>
  </div>

  <div class="card">
    <h3>📊 סיכום</h3>
    <canvas id="chart" height="200"></canvas>
  </div>

  <div class="card">
    <h3>➕ הוצאה</h3>
    <input id="note" placeholder="פירוט">
    <input id="amount" type="number" placeholder="₪ סכום">
    <button class="btn" id="addTxBtn">שמור</button>
  </div>

  <div class="card">
    <h3>📜 היסטוריה</h3>
    <div id="txList"></div>
  </div>
</div>

<!-- MAIN SCRIPT -->
<script type="module">
window.addEventListener("DOMContentLoaded", async () => {

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getAuth,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  import {
    getFirestore,
    collection,
    addDoc,
    onSnapshot,
    query,
    where,
    Timestamp
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU",
    authDomain: "expensetrackerpro-d216d.firebaseapp.com",
    projectId: "expensetrackerpro-d216d"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // Elements
  const authScreen = document.getElementById("authScreen");
  const mainApp    = document.getElementById("mainApp");
  const emailEl    = document.getElementById("email");
  const passEl     = document.getElementById("pass");
  const authErr    = document.getElementById("authErr");
  const hello      = document.getElementById("hello");
  const txList     = document.getElementById("txList");
  const noteEl     = document.getElementById("note");
  const amountEl   = document.getElementById("amount");
  const chartCanvas= document.getElementById("chart");

  let user  = null;
  let txs   = [];
  let chart = null;

  // Buttons
  document.getElementById("loginBtn").onclick  = () => authAction("login");
  document.getElementById("signupBtn").onclick = () => authAction("signup");
  document.getElementById("logoutBtn").onclick = () => signOut(auth);
  document.getElementById("addTxBtn").onclick  = addTx;

  async function authAction(type) {
    authErr.innerText = "";
    try {
      if (type === "login") {
        await signInWithEmailAndPassword(auth, emailEl.value, passEl.value);
      } else {
        await createUserWithEmailAndPassword(auth, emailEl.value, passEl.value);
      }
    } catch (e) {
      authErr.innerText = e.message;
    }
  }

  onAuthStateChanged(auth, u => {
    if (!u) {
      authScreen.style.display = "block";
      mainApp.style.display = "none";
      return;
    }

    user = u;
    authScreen.style.display = "none";
    mainApp.style.display = "block";
    hello.innerText = "שלום " + u.email;

    sync();
  });

  function sync() {
    onSnapshot(
      query(collection(db, "transactions"), where("user", "==", user.email)),
      snap => {
        txs = snap.docs.map(d => d.data());
        render();
      }
    );
  }

  async function addTx() {
    if (!amountEl.value) return;

    await addDoc(collection(db, "transactions"), {
      note: noteEl.value || "הוצאה",
      amount: Number(amountEl.value),
      user: user.email,
      date: Timestamp.now()
    });

    noteEl.value = "";
    amountEl.value = "";
  }

  function render() {
    txList.innerHTML = txs.map(t => `
      <div class="tx">
        <span>${t.note}</span>
        <b>₪${t.amount}</b>
      </div>
    `).join("");

    const total = txs.reduce((s, t) => s + t.amount, 0);

    if (chart) chart.destroy();
    chart = new Chart(chartCanvas, {
      type: "doughnut",
      data: {
        labels: ["סה״כ הוצאות"],
        datasets: [{ data: [total] }]
      }
    });
  }

});
</script>

<!-- Service Worker -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>

</body>
</html>
