<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>BudgetMaster Family Share</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; --gift: #ec4899; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; color: #1e293b; min-height: 100vh; }
        @media (min-width: 768px) { body { padding: 20px; } }
        @media (min-width: 1024px) { body { padding: 30px; } }
        
        .container { max-width: 1200px; margin: auto; }
        .hidden { display: none !important; }
        
        .header-section { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; flex-wrap: wrap; gap: 10px; }
        .header-section h2 { margin: 0; font-weight: 900; font-size: 1.5rem; }
        @media (max-width: 767px) { .header-section h2 { font-size: 1.3rem; } }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        @media (min-width: 768px) and (max-width: 1023px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } .dashboard-grid > :last-child { grid-column: 1 / -1; } }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 350px 1fr 300px; } }
        
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); margin-bottom: 20px; }
        @media (min-width: 768px) { .card:hover { transform: translateY(-2px); box-shadow: 0 15px 35px rgba(0,0,0,0.06); } }
        
        .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .category-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; user-select: none; }
        .category-card:active { transform: scale(0.98); }
        @media (min-width: 768px) { .category-card:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15); } }
        
        .progress-bg { background: #f1f5f9; height: 10px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.6s ease; }
        
        .btn { border: none; padding: 16px; border-radius: 16px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; width: 100%; transition: 0.3s; min-height: 50px; }
        @media (max-width: 767px) { .btn { padding: 18px; font-size: 17px; min-height: 54px; } }
        .btn:active { transform: scale(0.97); }
        .btn-primary { background: var(--primary); }
        .btn-primary:hover { background: #5558e3; }
        .btn-gift { background: var(--gift); }
        .btn-gift:hover { background: #db2777; }
        .btn-secondary { background: none; border: none; color: #64748b; padding: 12px; font-weight: 600; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(6px); padding: 20px; overflow-y: auto; }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto; animation: modalSlideIn 0.3s ease; }
        @keyframes modalSlideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        input, select, textarea { width: 100%; padding: 14px 16px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 16px; font-family: inherit; transition: 0.3s; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
        textarea { resize: vertical; min-height: 80px; }
        
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f8fafc; gap: 10px; }
        .item-row:last-child { border-bottom: none; }
        
        .share-header { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: white; padding: 18px; border-radius: 20px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        
        #logoutBtn { background: none; border: 2px solid var(--danger); color: var(--danger); font-weight: bold; cursor: pointer; padding: 10px 20px; border-radius: 12px; min-height: 44px; }
        #logoutBtn:hover { background: var(--danger); color: white; }
        
        #authSection { max-width: 400px; margin: 40px auto; text-align: center; border: 2px solid var(--primary); }
        #authSection h3 { margin-top: 0; font-size: 1.8rem; color: var(--primary); }
        
        .currency-converter { background: #f1f5f9; padding: 12px; border-radius: 15px; margin-bottom: 12px; display: flex; gap: 8px; }
        @media (max-width: 767px) { .currency-converter { flex-direction: column; } }
        
        .add-btn { border: none; background: var(--primary); color: white; cursor: pointer; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: bold; }
        .add-btn:hover { transform: rotate(90deg) scale(1.1); }
        
        .empty-state { text-align: center; padding: 40px 20px; color: #94a3b8; }
    </style>
</head>
<body>
<div class="container">
    <div class="header-section">
        <h2>החשבון המשותף שלנו 💎</h2>
        <button id="logoutBtn" class="hidden">התנתק</button>
    </div>

    <div id="authSection" class="card">
        <h3>ברוכים הבאים</h3>
        <input type="text" id="groupCode" placeholder="🔑 קוד שיתוף משפחתי">
        <input type="email" id="email" placeholder="📧 אימייל">
        <input type="password" id="pass" placeholder="🔒 סיסמה">
        <button class="btn btn-primary" id="loginBtn">התחברות / יצירת חשבון</button>
    </div>

    <div id="mainApp" class="hidden">
        <div class="share-header" id="displayGroup"></div>
        <div class="dashboard-grid">
            <div class="card">
                <div class="section-title">📜 היסטוריה</div>
                <div id="historyList"></div>
            </div>
            <div>
                <button class="btn btn-primary" id="openCatModalBtn" style="margin-bottom: 20px;">➕ קטגוריה חדשה</button>
                <div id="categoriesList"></div>
            </div>
            <div class="card" style="border-top: 4px solid var(--gift);">
                <div class="section-title">🎁 ארנק גיפטקארד <button id="openGiftModalBtn" class="add-btn">+</button></div>
                <div id="giftCardsList"></div>
            </div>
        </div>
    </div>
</div>

<div id="expModal" class="modal"><div class="modal-content">
    <h3 id="expTitle">הוצאה</h3>
    <div class="currency-converter">
        <input type="number" id="foreignAmt" placeholder="סכום במט״ח" oninput="doConvert()" step="0.01">
        <select id="currType" onchange="doConvert()">
            <option value="3.72">דולר $ (3.72)</option>
            <option value="4.05">יורו € (4.05)</option>
        </select>
    </div>
    <input type="number" id="expAmount" placeholder="סכום ב-₪" style="font-weight:800; text-align:center;" step="0.01">
    <select id="paymentMethod"></select>
    <textarea id="expNotes" placeholder="הערות..."></textarea>
    <input type="hidden" id="activeCatId">
    <button class="btn btn-primary" id="btnSaveTx">💾 שמור הוצאה</button>
    <button id="cancelExpBtn" class="btn-secondary">ביטול</button>
</div></div>

<div id="catModal" class="modal"><div class="modal-content">
    <h3>קטגוריה חדשה</h3>
    <input type="text" id="catName" placeholder="שם הקטגוריה">
    <input type="number" id="catBudget" placeholder="תקציב חודשי ₪" step="1">
    <button class="btn btn-primary" id="btnSaveCat">💾 שמור קטגוריה</button>
    <button id="cancelCatBtn" class="btn-secondary">ביטול</button>
</div></div>

<div id="giftModal" class="modal"><div class="modal-content">
    <h3>הוספת גיפטקארד</h3>
    <input type="text" id="giftName" placeholder="שם הכרטיס">
    <input type="number" id="giftBalance" placeholder="יתרה ₪" step="0.01">
    <button class="btn btn-gift" id="btnSaveGift">🎁 שמור גיפטקארד</button>
    <button id="cancelGiftBtn" class="btn-secondary">ביטול</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, updateDoc, doc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU", authDomain: "expensetrackerpro-d216d.firebaseapp.com", projectId: "expensetrackerpro-d216d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let activeGid = localStorage.getItem('familyCode') || "";
    let allCats = [], allTxs = [], allGifts = [];

    window.openM = (id) => { document.getElementById(id).style.display = 'flex'; if ('vibrate' in navigator) navigator.vibrate(10); };
    window.closeM = (id) => { document.getElementById(id).style.display = 'none'; };
    window.doConvert = () => { const f = parseFloat(document.getElementById('foreignAmt').value) || 0; document.getElementById('expAmount').value = Math.round(f * parseFloat(document.getElementById('currType').value) * 100) / 100; };

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('openCatModalBtn')?.addEventListener('click', () => openM('catModal'));
        document.getElementById('openGiftModalBtn')?.addEventListener('click', () => openM('giftModal'));
        document.getElementById('cancelExpBtn')?.addEventListener('click', () => closeM('expModal'));
        document.getElementById('cancelCatBtn')?.addEventListener('click', () => closeM('catModal'));
        document.getElementById('cancelGiftBtn')?.addEventListener('click', () => closeM('giftModal'));
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const mail = document.getElementById('email').value.trim(), p = document.getElementById('pass').value, code = document.getElementById('groupCode').value.trim();
        if (!code || !mail || !p) return alert("❌ נא למלא את כל השדות!");
        activeGid = code; localStorage.setItem('familyCode', code);
        try { await signInWithEmailAndPassword(auth, mail, p); }
        catch (e) { if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password') { try { await createUserWithEmailAndPassword(auth, mail, p); alert("✅ חשבון חדש נוצר!"); } catch (err) { alert("❌ " + err.message); } } else alert("❌ " + e.message); }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => { if (confirm('🚪 להתנתק?')) { signOut(auth); localStorage.removeItem('familyCode'); location.reload(); } });

    onAuthStateChanged(auth, u => {
        if(u && activeGid) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('displayGroup').innerText = "📍 " + activeGid;
            sync();
        } else {
            document.getElementById('authSection').classList.remove('hidden');
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
        }
    });

    function sync() {
        onSnapshot(query(collection(db, "categories"), where("groupId", "==", activeGid)), s => { allCats = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
        onSnapshot(query(collection(db, "transactions"), where("groupId", "==", activeGid)), s => { allTxs = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => (b.date?.seconds || 0) - (a.date?.seconds || 0)); render(); });
        onSnapshot(query(collection(db, "giftcards"), where("groupId", "==", activeGid)), s => { allGifts = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
    }

    document.getElementById('btnSaveCat').addEventListener('click', async () => {
        const name = document.getElementById('catName').value.trim(), budget = parseFloat(document.getElementById('catBudget').value);
        if (!name || !budget || budget <= 0) return alert('❌ נא למלא נכון');
        try { await addDoc(collection(db, "categories"), { name, budget, groupId: activeGid, createdAt: Timestamp.now() }); closeM('catModal'); if ('vibrate' in navigator) navigator.vibrate(50); }
        catch (e) { alert('❌ ' + e.message); }
    });

    window.openExpModal = (id, name) => {
        document.getElementById('activeCatId').value = id;
        document.getElementById('expTitle').innerText = "הוספה ל: " + name;
        let opts = `<option value="אשראי">💳 אשראי</option><option value="מזומן">💵 מזומן</option>`;
        allGifts.forEach(g => { opts += `<option value="gift_${g.id}">🎁 ${g.name} (₪${g.balance.toFixed(2)})</option>`; });
        document.getElementById('paymentMethod').innerHTML = opts;
        openM('expModal');
    };

    document.getElementById('btnSaveTx').addEventListener('click', async () => {
        const amt = parseFloat(document.getElementById('expAmount').value), meth = document.getElementById('paymentMethod').value, notes = document.getElementById('expNotes').value.trim();
        if (!amt || amt <= 0) return alert('❌ סכום לא תקין');
        try {
            if(meth.startsWith('gift_')) {
                const gId = meth.split('_')[1], g = allGifts.find(x => x.id === gId);
                if (g.balance < amt) return alert('❌ אין מספיק יתרה');
                await updateDoc(doc(db, "giftcards", gId), { balance: g.balance - amt });
            }
            await addDoc(collection(db, "transactions"), { amount: amt, catId: document.getElementById('activeCatId').value, method: meth, notes: notes || '', groupId: activeGid, date: Timestamp.now() });
            closeM('expModal'); if ('vibrate' in navigator) navigator.vibrate(50);
        } catch (e) { alert('❌ ' + e.message); }
    });

    document.getElementById('btnSaveGift').addEventListener('click', async () => {
        const name = document.getElementById('giftName').value.trim(), balance = parseFloat(document.getElementById('giftBalance').value);
        if (!name || !balance || balance <= 0) return alert('❌ נא למלא נכון');
        try { await addDoc(collection(db, "giftcards"), { name, balance, groupId: activeGid, createdAt: Timestamp.now() }); closeM('giftModal'); if ('vibrate' in navigator) navigator.vibrate(50); }
        catch (e) { alert('❌ ' + e.message); }
    });

    // ============ מחיקת טרנזקציה ============
    window.deleteTx = async (txId) => {
        if (!confirm('🗑️ למחוק הוצאה זו?')) return;
        try {
            const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
            await deleteDoc(doc(db, "transactions", txId));
            if ('vibrate' in navigator) navigator.vibrate(50);
        } catch (e) { alert('❌ שגיאה במחיקה: ' + e.message); }
    };

    // ============ עריכת טרנזקציה ============
    window.editTx = async (txId) => {
        const tx = allTxs.find(t => t.id === txId);
        if (!tx) return;
        
        const newAmount = prompt(`✏️ ערוך סכום:\n(סכום נוכחי: ₪${tx.amount})`, tx.amount);
        if (!newAmount || newAmount === tx.amount.toString()) return;
        
        const amt = parseFloat(newAmount);
        if (isNaN(amt) || amt <= 0) return alert('❌ סכום לא תקין');
        
        try {
            await updateDoc(doc(db, "transactions", txId), { amount: amt });
            if ('vibrate' in navigator) navigator.vibrate(50);
        } catch (e) { alert('❌ שגיאה בעדכון: ' + e.message); }
    };

    // ============ מחיקת קטגוריה ============
    window.deleteCat = async (catId) => {
        const cat = allCats.find(c => c.id === catId);
        const txCount = allTxs.filter(t => t.catId === catId).length;
        if (txCount > 0) {
            if (!confirm(`⚠️ יש ${txCount} הוצאות בקטגוריה "${cat.name}".\nהמחיקה תמחק גם את כל ההוצאות!\n\nלהמשיך?`)) return;
        } else {
            if (!confirm(`🗑️ למחוק את הקטגוריה "${cat.name}"?`)) return;
        }
        try {
            const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
            // מחק קטגוריה
            await deleteDoc(doc(db, "categories", catId));
            // מחק את כל ההוצאות של הקטגוריה
            for (const tx of allTxs.filter(t => t.catId === catId)) {
                await deleteDoc(doc(db, "transactions", tx.id));
            }
            if ('vibrate' in navigator) navigator.vibrate(50);
        } catch (e) { alert('❌ שגיאה במחיקה: ' + e.message); }
    };

    // ============ מחיקת גיפטקארד ============
    window.deleteGift = async (giftId) => {
        const gift = allGifts.find(g => g.id === giftId);
        if (!confirm(`🗑️ למחוק את "${gift.name}"?`)) return;
        try {
            const { deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js");
            await deleteDoc(doc(db, "giftcards", giftId));
            if ('vibrate' in navigator) navigator.vibrate(50);
        } catch (e) { alert('❌ שגיאה במחיקה: ' + e.message); }
    };

    function render() {
        if (!activeGid || !auth.currentUser) return;
        const catsList = document.getElementById('categoriesList');
        if (!catsList) return;
        if (allCats.length === 0) catsList.innerHTML = '<div class="empty-state">📝 אין קטגוריות</div>';
        else catsList.innerHTML = allCats.map(c => {
            const spent = allTxs.filter(t => t.catId === c.id).reduce((s,t) => s + t.amount, 0);
            const pct = Math.min((spent / c.budget) * 100, 100);
            return `<div class="category-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div onclick="openExpModal('${c.id}','${c.name}')" style="flex:1; cursor:pointer;">
                        <div style="display:flex; justify-content:space-between"><strong>${c.name}</strong><span>₪${spent.toFixed(2)} / ₪${c.budget.toFixed(2)}</span></div>
                        <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:${pct > 90 ? 'var(--danger)' : 'var(--success)'}"></div></div>
                        ${spent > c.budget ? '<small style="color:var(--danger);">⚠️ חריגה!</small>' : ''}
                    </div>
                    <button onclick="deleteCat('${c.id}')" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:18px; padding:5px; margin-right:10px;" title="מחק קטגוריה">🗑️</button>
                </div>
            </div>`;
        }).join('');

        const histList = document.getElementById('historyList');
        if (allTxs.length === 0) histList.innerHTML = '<div class="empty-state">📊 אין הוצאות</div>';
        else histList.innerHTML = allTxs.slice(0, 15).map(t => {
            const cat = allCats.find(c => c.id === t.catId);
            const date = t.date ? new Date(t.date.seconds * 1000) : new Date();
            const dateStr = date.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit' });
            return `<div class="item-row">
                <div><strong>${cat ? cat.name : 'כללי'}</strong><br><small>${t.method} • ${dateStr}</small>${t.notes ? `<br><small style="color:#94a3b8">${t.notes}</small>` : ''}</div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <strong style="color:var(--danger)">₪${t.amount.toFixed(2)}</strong>
                    <button onclick="editTx('${t.id}')" style="background:none; border:none; color:#6366f1; cursor:pointer; font-size:18px; padding:5px;" title="ערוך">✏️</button>
                    <button onclick="deleteTx('${t.id}')" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:18px; padding:5px;" title="מחק">🗑️</button>
                </div>
            </div>`;
        }).join('');

        const giftList = document.getElementById('giftCardsList');
        if (allGifts.length === 0) giftList.innerHTML = '<div class="empty-state">🎁 אין גיפטקארדים</div>';
        else giftList.innerHTML = allGifts.map(g => `<div class="item-row">
            <span>${g.name}</span>
            <div style="display:flex; align-items:center; gap:10px;">
                <strong style="color:var(--gift)">₪${g.balance.toFixed(2)}</strong>
                <button onclick="deleteGift('${g.id}')" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:18px; padding:5px;" title="מחק">🗑️</button>
            </div>
        </div>`).join('');
    }

    document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.style.display = 'none'; }));
    document.getElementById('email').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('pass').focus(); });
    document.getElementById('pass').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
</script>
</body>
</html>
