<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BudgetMaster Pro v2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; --gift: #ec4899; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; direction: rtl; }
        .container { max-width: 1200px; margin: auto; }
        .card { background: white; border-radius: 20px; padding: 15px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1000px) { .dashboard-grid { grid-template-columns: 320px 1fr 320px; } }
        
        .category-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #f1f5f9; }
        .progress-container { background: #f1f5f9; height: 10px; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.8s ease; }

        .btn { border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gift { background: var(--gift); color: white; }
        .btn-danger { background: var(--danger); color: white; margin-top: 10px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 15px; }
        .modal-content { background: white; padding: 25px; border-radius: 24px; width: 100%; max-width: 400px; box-sizing: border-box; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; }

        .converter-row { display: flex; gap: 8px; background: #f8fafc; padding: 10px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 10px; align-items: center; }
        .converter-row input { margin: 0; flex: 1; }
        
        .history-list { max-height: 400px; overflow-y: auto; }
        .history-item { padding: 12px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .hidden { display: none !important; }
        .gift-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px dashed #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="authSection" class="card" style="max-width: 350px; margin: 80px auto; text-align: center;">
        <h2>BudgetMaster Pro 💎</h2>
        <input type="email" id="email" placeholder="אימייל" value="wekax2004@gmail.com">
        <input type="password" id="pass" placeholder="סיסמה">
        <button class="btn btn-primary" id="loginBtn">התחבר</button>
    </div>

    <div id="mainApp" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>התקציב החכם 🏠</h2>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--primary); font-weight:bold;">יציאה</button>
        </div>

        <div class="dashboard-grid">
            <div>
                <div class="card" style="border-right: 5px solid var(--gift);">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>🎁 כרטיסי מתנה</strong>
                        <button onclick="openM('giftModal')" style="border:none; background:none; cursor:pointer; font-size:20px;">+</button>
                    </div>
                    <div id="giftCardsList" style="margin-top:10px;"></div>
                </div>

                <div class="card">
                    <strong>פילוח תשלומים</strong>
                    <div style="height: 200px; margin-top:15px;"><canvas id="methodChart"></canvas></div>
                </div>
            </div>

            <div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openCatModal('expense')">➕ קטגוריה</button>
                    <button class="btn btn-gift" onclick="openCatModal('savings')">💰 יעד חיסכון</button>
                </div>
                <div id="categoriesList" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px;"></div>
            </div>

            <div class="card">
                <h3>היסטוריה</h3>
                <div id="historyList" class="history-list"></div>
            </div>
        </div>
    </div>
</div>

<div id="expModal" class="modal"><div class="modal-content">
    <h3 id="expTitle">פעולה חדשה</h3>
    <div class="converter-row">
        <input type="number" id="foreignAmt" placeholder="סכום מט״ח" oninput="doConvert()">
        <select id="currType" onchange="doConvert()" style="width:80px;">
            <option value="USD">USD $</option>
            <option value="EUR">EUR €</option>
        </select>
    </div>
    <input type="number" id="expAmount" placeholder="סכום סופי ₪" style="font-weight:bold; border:2px solid var(--primary);">
    <select id="paymentMethod" onchange="checkGift()"></select>
    <textarea id="expNotes" placeholder="הערות..."></textarea>
    <input type="hidden" id="activeCatId">
    <input type="hidden" id="editingTxId">
    <button class="btn btn-primary" id="btnSaveTx">שמור</button>
    <button class="btn btn-danger" id="btnDelTx" style="display:none;">מחק פעולה</button>
    <button class="btn btn-ghost" onclick="closeM('expModal')">ביטול</button>
</div></div>

<div id="catModal" class="modal"><div class="modal-content">
    <h3 id="catTitle">קטגוריה</h3>
    <input type="text" id="catName" placeholder="שם הקטגוריה">
    <input type="number" id="catBudget" placeholder="תקציב יעד ₪">
    <input type="hidden" id="editingCatId">
    <input type="hidden" id="catTypeHidden">
    <button class="btn btn-primary" id="btnSaveCat">שמור</button>
    <button class="btn btn-danger" id="btnDelCat" style="display:none;">מחק קטגוריה</button>
    <button class="btn btn-ghost" onclick="closeM('catModal')">ביטול</button>
</div></div>

<div id="giftModal" class="modal"><div class="modal-content">
    <h3>הוספת כרטיס מתנה</h3>
    <input type="text" id="giftName" placeholder="שם הכרטיס">
    <input type="number" id="giftBalance" placeholder="סכום טעון ₪">
    <button class="btn btn-gift" id="btnSaveGift">שמור כרטיס</button>
    <button class="btn btn-ghost" onclick="closeM('giftModal')">ביטול</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, doc, Timestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU", authDomain: "expensetrackerpro-d216d.firebaseapp.com", projectId: "expensetrackerpro-d216d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    
    let myGroupId = "Mishpacha_VIP_Group_2025";
    let allCats = [], allTxs = [], allGifts = [], chart = null;
    let rates = { USD: 3.75, EUR: 4.10 };

    // פונקציות עזר
    window.openM = (id) => document.getElementById(id).style.display = 'flex';
    window.closeM = (id) => document.getElementById(id).style.display = 'none';
    window.doConvert = () => {
        const val = parseFloat(foreignAmt.value) || 0;
        expAmount.value = Math.round(val * rates[currType.value]);
    };

    // חיבור
    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, email.value, pass.value);

    onAuthStateChanged(auth, u => {
        if(u) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            syncData();
        }
    });

    function syncData() {
        onSnapshot(query(collection(db, "categories"), where("groupId", "==", myGroupId)), s => {
            allCats = s.docs.map(d => ({id:d.id, ...d.data()}));
            render();
        });
        onSnapshot(query(collection(db, "transactions"), where("groupId", "==", myGroupId)), s => {
            allTxs = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => b.date - a.date);
            render();
        });
        onSnapshot(query(collection(db, "giftcards"), where("groupId", "==", myGroupId)), s => {
            allGifts = s.docs.map(d => ({id:d.id, ...d.data()}));
            render();
        });
    }

    // ניהול קטגוריות
    window.openCatModal = (type, id = null) => {
        const cat = allCats.find(c => c.id === id);
        editingCatId.value = id || '';
        catTypeHidden.value = type;
        catName.value = cat ? cat.name : '';
        catBudget.value = cat ? cat.budget : '';
        document.getElementById('btnDelCat').style.display = id ? 'block' : 'none';
        openM('catModal');
    };

    document.getElementById('btnSaveCat').onclick = async () => {
        const data = { name: catName.value, budget: parseFloat(catBudget.value), type: catTypeHidden.value, groupId: myGroupId };
        if(editingCatId.value) await updateDoc(doc(db, "categories", editingCatId.value), data);
        else await addDoc(collection(db, "categories"), data);
        closeM('catModal');
    };

    document.getElementById('btnDelCat').onclick = async () => {
        if(confirm("למחוק קטגוריה?")) {
            await deleteDoc(doc(db, "categories", editingCatId.value));
            closeM('catModal');
        }
    };

    // ניהול הוצאות
    window.openExpModal = (catId, catNameStr, txId = null) => {
        const tx = allTxs.find(t => t.id === txId);
        activeCatId.value = catId;
        editingTxId.value = txId || '';
        expTitle.innerText = txId ? "עריכת פעולה" : "הוספה ל: " + catNameStr;
        expAmount.value = tx ? tx.amount : '';
        expNotes.value = tx ? (tx.notes || '') : '';
        
        // בניית רשימת אמצעי תשלום
        let options = `<option value="אשראי">💳 אשראי</option><option value="מזומן">💵 מזומן</option>`;
        allGifts.forEach(g => { options += `<option value="gift_${g.id}">🎁 ${g.name} (₪${g.balance})</option>`; });
        document.getElementById('paymentMethod').innerHTML = options;
        if(tx) document.getElementById('paymentMethod').value = tx.method;

        document.getElementById('btnDelTx').style.display = txId ? 'block' : 'none';
        openM('expModal');
    };

    document.getElementById('btnSaveTx').onclick = async () => {
        const amt = parseFloat(expAmount.value);
        const method = document.getElementById('paymentMethod').value;
        const cat = allCats.find(c => c.id === activeCatId.value);
        
        const data = { 
            amount: amt, catId: activeCatId.value, catName: cat.name, 
            method: method, notes: expNotes.value, groupId: myGroupId, date: Timestamp.now() 
        };

        if(method.startsWith('gift_') && !editingTxId.value) {
            const gid = method.split('_')[1];
            const gCard = allGifts.find(g => g.id === gid);
            await updateDoc(doc(db, "giftcards", gid), { balance: gCard.balance - amt });
        }

        if(editingTxId.value) await updateDoc(doc(db, "transactions", editingTxId.value), data);
        else await addDoc(collection(db, "transactions"), data);
        closeM('expModal');
    };

    document.getElementById('btnDelTx').onclick = async () => {
        if(confirm("למחוק פעולה זו?")) {
            await deleteDoc(doc(db, "transactions", editingTxId.value));
            closeM('expModal');
        }
    };

    // גיפטקארד
    document.getElementById('btnSaveGift').onclick = async () => {
        await addDoc(collection(db, "giftcards"), { name: giftName.value, balance: parseFloat(giftBalance.value), groupId: myGroupId });
        closeM('giftModal');
    };

    function render() {
        // קטגוריות
        categoriesList.innerHTML = allCats.map(c => {
            const spent = allTxs.filter(t => t.catId === c.id).reduce((s,t) => s + t.amount, 0);
            const pct = Math.min((spent / c.budget) * 100, 100);
            return `<div class="category-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong onclick="openCatModal('${c.type}', '${c.id}')" style="cursor:pointer;">${c.name} ⚙️</strong>
                    <button class="btn" style="width:40px; padding:5px; background:var(--primary); color:white;" onclick="openExpModal('${c.id}', '${c.name}')">+</button>
                </div>
                <div style="margin-top:10px; font-size:14px;">₪${spent.toLocaleString()} / ₪${c.budget.toLocaleString()}</div>
                <div class="progress-container"><div class="progress-bar" style="width:${pct}%; background:${pct > 90 ? 'var(--danger)' : 'var(--success)'}"></div></div>
            </div>`;
        }).join('');

        // גיפטקארד
        giftCardsList.innerHTML = allGifts.map(g => `<div class="gift-item"><span>${g.name}</span><strong>₪${g.balance}</strong></div>`).join('');

        // היסטוריה
        historyList.innerHTML = allTxs.slice(0, 20).map(t => `<div class="history-item" onclick="openExpModal('${t.catId}', '${t.catName}', '${t.id}')">
            <div><strong>${t.catName}</strong><br><small>${t.method.includes('gift') ? '🎁 גיפטקארד' : t.method}</small></div>
            <strong style="color:var(--danger)">₪${t.amount}</strong>
        </div>`).join('');

        // גרף
        if(chart) chart.destroy();
        const counts = {}; allTxs.forEach(t => { 
            const label = t.method.includes('gift') ? '🎁 גיפטקארד' : t.method;
            counts[label] = (counts[label] || 0) + t.amount; 
        });
        chart = new Chart(document.getElementById('methodChart'), {
            type: 'doughnut',
            data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#6366f1', '#fbbf24', '#22c55e', '#ec4899'] }] },
            options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
        });
    }
</script>
</body>
</html>
