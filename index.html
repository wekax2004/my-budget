<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BudgetMaster Pro 2025</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; --gift: #ec4899; --savings: #0ea5e9; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; color: #1e293b; }
        .container { max-width: 1300px; margin: auto; }
        
        /* Layout Grid */
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 320px 1fr 320px; align-items: start; } }

        /* Card Styling */
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); height: fit-content; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        /* Category Cards */
        .category-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #f1f5f9; position: relative; }
        .progress-bg { background: #f1f5f9; height: 8px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.6s ease; }

        /* Buttons */
        .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .btn { border: none; padding: 14px; border-radius: 16px; cursor: pointer; font-weight: bold; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; color: white; }
        .btn-primary { background: var(--primary); }
        .btn-gift { background: var(--gift); }
        .btn-action { width: 32px; height: 32px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; cursor: pointer; font-size: 14px; }

        /* List Items */
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f8fafc; cursor: pointer; }
        .badge { font-size: 0.75rem; padding: 3px 8px; border-radius: 8px; background: #f1f5f9; color: #64748b; font-weight: 600; }

        /* Modal */
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(6px); padding: 15px; }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; box-sizing: border-box; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 16px; box-sizing: border-box; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
        <h2 style="margin:0; font-weight: 900; letter-spacing: -1px;">התקציב החכם שלי 💎</h2>
        <button onclick="location.reload()" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer;">יציאה</button>
    </div>

    <div id="authSection" class="card" style="max-width: 380px; margin: 60px auto; text-align: center;">
        <h3>ברוכים הבאים</h3>
        <input type="email" id="email" placeholder="אימייל" value="wekax2004@gmail.com">
        <input type="password" id="pass" placeholder="סיסמה">
        <button class="btn btn-primary" style="width:100%" id="loginBtn">התחברות</button>
    </div>

    <div id="mainApp" class="hidden">
        <div class="dashboard-grid">
            
            <div class="card">
                <div class="section-title"><span>📜 היסטוריה</span></div>
                <div id="historyList"></div>
            </div>

            <div>
                <div class="btn-row">
                    <button class="btn btn-primary" onclick="openCatModal('expense')">➕ קטגוריה</button>
                    <button class="btn btn-gift" onclick="openCatModal('savings')">💰 יעד חיסכון</button>
                </div>
                <div id="categoriesList"></div>
            </div>

            <div>
                <div class="card" style="margin-bottom: 20px; border-top: 4px solid var(--gift);">
                    <div class="section-title">
                        <span>🎁 ארנק גיפטקארד</span>
                        <button onclick="openM('giftModal')" style="border:none; background:none; font-size:20px; cursor:pointer;">+</button>
                    </div>
                    <div id="giftCardsList"></div>
                </div>

                <div class="card" style="margin-bottom: 20px;">
                    <div class="section-title"><span>📊 אמצעי תשלום</span></div>
                    <div style="height: 220px;"><canvas id="methodChart"></canvas></div>
                </div>

                <div class="card" style="background: #eff6ff; text-align: center;">
                    <small style="color: #1d4ed8; font-weight: bold;">חיסכון מצטבר</small>
                    <div id="savingsTotal" style="font-size: 1.8rem; font-weight: 900; color: #1e40af;">₪0</div>
                </div>
            </div>

        </div>
    </div>
</div>

<div id="expModal" class="modal"><div class="modal-content">
    <h3 id="expTitle">פעולה חדשה</h3>
    <input type="number" id="expAmount" placeholder="סכום ב-₪" style="font-size: 20px; font-weight: 800; text-align: center; border-color: var(--primary);">
    <select id="paymentMethod"></select>
    <textarea id="expNotes" placeholder="מה קנינו? (הערות)"></textarea>
    <input type="hidden" id="activeCatId"><input type="hidden" id="editingTxId">
    <button class="btn btn-primary" style="width:100%" id="btnSaveTx">שמור פעולה</button>
    <button id="btnDelTx" style="background:none; border:none; color:var(--danger); margin-top:15px; width:100%; cursor:pointer; display:none;">מחק פעולה</button>
    <button onclick="closeM('expModal')" style="background:none; border:none; color:#64748b; margin-top:10px; width:100%; cursor:pointer;">ביטול</button>
</div></div>

<div id="catModal" class="modal"><div class="modal-content">
    <h3>הגדרת קטגוריה</h3>
    <input type="text" id="catName" placeholder="שם (לדוגמה: אוכל)">
    <input type="number" id="catBudget" placeholder="תקציב חודשי ₪">
    <input type="hidden" id="editingCatId"><input type="hidden" id="catTypeHidden">
    <button class="btn btn-primary" style="width:100%" id="btnSaveCat">שמור</button>
    <button id="btnDelCat" style="background:none; border:none; color:var(--danger); margin-top:15px; width:100%; cursor:pointer; display:none;">מחק קטגוריה</button>
    <button onclick="closeM('catModal')" style="background:none; border:none; color:#64748b; margin-top:10px; width:100%; cursor:pointer;">ביטול</button>
</div></div>

<div id="giftModal" class="modal"><div class="modal-content">
    <h3>הוספת כרטיס מתנה</h3>
    <input type="text" id="giftName" placeholder="שם הכרטיס (לדוגמה: BuyMe)">
    <input type="number" id="giftBalance" placeholder="סכום טעון ₪">
    <button class="btn btn-gift" style="width:100%" id="btnSaveGift">שמור כרטיס</button>
    <button onclick="closeM('giftModal')" style="background:none; border:none; color:#64748b; margin-top:10px; width:100%; cursor:pointer;">ביטול</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, updateDoc, deleteDoc, doc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU", authDomain: "expensetrackerpro-d216d.firebaseapp.com", projectId: "expensetrackerpro-d216d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const gid = "mishpacha_2025_final";
    
    let allCats = [], allTxs = [], allGifts = [], chart = null;

    window.openM = (id) => document.getElementById(id).style.display = 'flex';
    window.closeM = (id) => document.getElementById(id).style.display = 'none';

    document.getElementById('loginBtn').onclick = () => signInWithEmailAndPassword(auth, email.value, pass.value);

    onAuthStateChanged(auth, u => { if(u) { authSection.classList.add('hidden'); mainApp.classList.remove('hidden'); sync(); } });

    function sync() {
        onSnapshot(query(collection(db, "categories"), where("groupId", "==", gid)), s => { allCats = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
        onSnapshot(query(collection(db, "transactions"), where("groupId", "==", gid)), s => { allTxs = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => b.date - a.date); render(); });
        onSnapshot(query(collection(db, "giftcards"), where("groupId", "==", gid)), s => { allGifts = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
    }

    window.openCatModal = (type, id = null) => {
        const cat = allCats.find(c => c.id === id);
        editingCatId.value = id || ''; catTypeHidden.value = type;
        catName.value = cat ? cat.name : ''; catBudget.value = cat ? cat.budget : '';
        btnDelCat.style.display = id ? 'block' : 'none'; openM('catModal');
    };

    document.getElementById('btnSaveCat').onclick = async () => {
        const d = { name: catName.value, budget: parseFloat(catBudget.value), type: catTypeHidden.value, groupId: gid };
        editingCatId.value ? await updateDoc(doc(db, "categories", editingCatId.value), d) : await addDoc(collection(db, "categories"), d);
        closeM('catModal');
    };

    document.getElementById('btnDelCat').onclick = async () => { if(confirm("למחוק?")) { await deleteDoc(doc(db, "categories", editingCatId.value)); closeM('catModal'); } };

    window.openExpModal = (catId, catNameStr, txId = null) => {
        const tx = allTxs.find(t => t.id === txId);
        activeCatId.value = catId; editingTxId.value = txId || '';
        expTitle.innerText = txId ? "עריכת פעולה" : "הוספה ל: " + catNameStr;
        expAmount.value = tx ? tx.amount : ''; expNotes.value = tx ? (tx.notes || '') : '';
        
        let opts = `<option value="אשראי">💳 אשראי</option><option value="מזומן">💵 מזומן</option><option value="ביט">📱 ביט</option>`;
        allGifts.forEach(g => opts += `<option value="gift_${g.id}">🎁 ${g.name}</option>`);
        paymentMethod.innerHTML = opts; if(tx) paymentMethod.value = tx.method;
        btnDelTx.style.display = txId ? 'block' : 'none'; openM('expModal');
    };

    document.getElementById('btnSaveTx').onclick = async () => {
        const amt = parseFloat(expAmount.value); const meth = paymentMethod.value;
        const cat = allCats.find(c => c.id === activeCatId.value);
        const d = { amount: amt, catId: activeCatId.value, catName: cat.name, method: meth, notes: expNotes.value, groupId: gid, date: Timestamp.now() };
        if(meth.startsWith('gift_') && !editingTxId.value) {
            const g = allGifts.find(x => x.id === meth.split('_')[1]);
            await updateDoc(doc(db, "giftcards", g.id), { balance: g.balance - amt });
        }
        editingTxId.value ? await updateDoc(doc(db, "transactions", editingTxId.value), d) : await addDoc(collection(db, "transactions"), d);
        closeM('expModal');
    };

    document.getElementById('btnDelTx').onclick = async () => { if(confirm("למחוק?")) { await deleteDoc(doc(db, "transactions", editingTxId.value)); closeM('expModal'); } };
    document.getElementById('btnSaveGift').onclick = async () => { await addDoc(collection(db, "giftcards"), { name: giftName.value, balance: parseFloat(giftBalance.value), groupId: gid }); closeM('giftModal'); };

    function render() {
        categoriesList.innerHTML = allCats.map(c => {
            const spent = allTxs.filter(t => t.catId === c.id).reduce((s,t) => s + t.amount, 0);
            const pct = Math.min((spent / c.budget) * 100, 100);
            return `<div class="category-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div onclick="openCatModal('${c.type}', '${c.id}')" style="cursor:pointer"><strong>${c.name}</strong><br><small style="color:gray">₪${spent} מתוך ₪${c.budget}</small></div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn-action" onclick="openCatModal('${c.type}', '${c.id}')">⚙️</button>
                        <button class="btn-action" style="background:var(--primary); color:white; border:none;" onclick="openExpModal('${c.id}', '${c.name}')">+</button>
                    </div>
                </div>
                <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:${pct > 90 ? 'var(--danger)' : 'var(--success)'}"></div></div>
            </div>`;
        }).join('');

        historyList.innerHTML = allTxs.slice(0, 15).map(t => `<div class="item-row" onclick="openExpModal('${t.catId}', '${t.catName}', '${t.id}')">
            <div><strong>${t.catName}</strong><br><span class="badge">${t.method.includes('gift') ? '🎁 גיפטקארד' : t.method}</span></div>
            <div style="font-weight:800; color:var(--danger)">₪${t.amount}</div>
        </div>`).join('');

        giftCardsList.innerHTML = allGifts.map(g => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed #eee;"><span>${g.name}</span><strong>₪${g.balance}</strong></div>`).join('') || '<small>אין כרטיסים</small>';

        savingsTotal.innerText = `₪${allCats.filter(c=>c.type==='savings').reduce((sum,c)=> sum + allTxs.filter(t=>t.catId===c.id).reduce((s,t)=>s+t.amount,0),0).toLocaleString()}`;

        if(chart) chart.destroy();
        const counts = {}; allTxs.forEach(t => { const l = t.method.includes('gift') ? '🎁 גיפטקארד' : t.method; counts[l] = (counts[l] || 0) + t.amount; });
        chart = new Chart(document.getElementById('methodChart'), { type: 'doughnut', data: { labels: Object.keys(counts), datasets: [{ data: Object.values(counts), backgroundColor: ['#6366f1', '#fbbf24', '#22c55e', '#ec4899', '#0ea5e9'] }] }, options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } } } });
    }
</script>
</body>
</html>
