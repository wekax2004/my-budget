<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>BudgetMaster Pro</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#6366f1">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --primary:#6366f1; --bg:#f8fafc;
      --success:#22c55e; --danger:#ef4444;
    }
    body {
      font-family: system-ui, sans-serif;
      background:var(--bg);
      margin:0; padding:15px;
    }
    .card {
      background:#fff; border-radius:20px;
      padding:20px; margin-bottom:15px;
      box-shadow:0 4px 15px rgba(0,0,0,.05);
    }
    .btn {
      width:100%; padding:12px;
      border:none; border-radius:12px;
      background:var(--primary);
      color:#fff; font-weight:bold;
      cursor:pointer;
    }
    input,select {
      width:100%; padding:12px;
      border-radius:12px;
      border:1px solid #e5e7eb;
      margin:6px 0;
    }
    #mainApp { display:none; }
    .tx {
      display:flex; justify-content:space-between;
      padding:10px; border-bottom:1px solid #eee;
      cursor:pointer;
    }
  </style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="card">
  <h2 style="text-align:center">BudgetMaster 💎</h2>
  <input id="email" type="email" placeholder="אימייל">
  <input id="pass" type="password" placeholder="סיסמה">
  <button class="btn" onclick="authAction('login')">התחברות</button>
  <button class="btn" style="background:#94a3b8" onclick="authAction('signup')">הרשמה</button>
  <p id="authErr" style="color:red;text-align:center"></p>
</div>

<!-- APP -->
<div id="mainApp">
  <div class="card">
    <h3 id="hello"></h3>
    <button onclick="logout()" style="color:red;background:none;border:none">התנתק</button>
  </div>

  <div class="card">
    <h3>📊 סיכום</h3>
    <canvas id="chart" height="200"></canvas>
  </div>

  <div class="card">
    <h3>➕ הוצאה</h3>
    <input id="note" placeholder="פירוט">
    <input id="amount" type="number" placeholder="₪ סכום">
    <button class="btn" onclick="addTx()">שמור</button>
  </div>

  <div class="card">
    <h3>📜 היסטוריה</h3>
    <div id="txList"></div>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU",
  authDomain: "expensetrackerpro-d216d.firebaseapp.com",
  projectId: "expensetrackerpro-d216d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user=null, txs=[], chart=null;

window.authAction = async type => {
  const e=email.value, p=pass.value;
  try {
    type==="login"
      ? await signInWithEmailAndPassword(auth,e,p)
      : await createUserWithEmailAndPassword(auth,e,p);
  } catch(err) {
    authErr.innerText = err.message;
  }
};

window.logout = () => signOut(auth);

onAuthStateChanged(auth,u=>{
  if(!u) return;
  user=u;
  auth.style.display="none";
  mainApp.style.display="block";
  hello.innerText="שלום "+u.email;
  sync();
});

function sync(){
  onSnapshot(
    query(collection(db,"transactions"), where("user","==",user.email)),
    s=>{
      txs=s.docs.map(d=>d.data());
      render();
    }
  );
}

window.addTx = async ()=>{
  await addDoc(collection(db,"transactions"),{
    note:note.value||"הוצאה",
    amount:+amount.value||0,
    user:user.email,
    date:Timestamp.now()
  });
  note.value=""; amount.value="";
};

function render(){
  txList.innerHTML = txs.map(t=>`
    <div class="tx">
      <span>${t.note}</span>
      <b>₪${t.amount}</b>
    </div>
  `).join("");

  const total = txs.reduce((s,t)=>s+t.amount,0);
  if(chart) chart.destroy();
  chart = new Chart(chartEl,{
    type:"doughnut",
    data:{labels:["סה\"כ"],datasets:[{data:[total]}]}
  });
}
</script>

<!-- SERVICE WORKER -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>

</body>
</html>
