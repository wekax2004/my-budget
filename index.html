<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BudgetMaster Family Share</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; --gift: #ec4899; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; color: #1e293b; }
        .container { max-width: 1200px; margin: auto; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 350px 1fr 300px; } }
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); height: fit-content; margin-bottom: 20px; }
        .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .category-card { background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #f1f5f9; cursor: pointer; transition: 0.2s; }
        .progress-bg { background: #f1f5f9; height: 10px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.6s ease; }
        .btn { border: none; padding: 14px; border-radius: 16px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; width: 100%; }
        .btn-primary { background: var(--primary); }
        .btn-gift { background: var(--gift); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(6px); padding: 15px; }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 420px; box-sizing: border-box; }
        input, select, textarea { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 16px; box-sizing: border-box; }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f8fafc; }
        .hidden { display: none !important; }
        .share-header { background: #6366f1; color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
        <h2 style="margin:0; font-weight: 900;">החשבון המשותף שלנו 💎</h2>
        <button id="logoutBtn" class="hidden" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer;">התנתק</button>
    </div>

    <div id="authSection" class="card" style="max-width: 400px; margin: 40px auto; text-align: center; border: 2px solid var(--primary);">
        <h3>ברוכים הבאים</h3>
        <input type="text" id="groupCode" placeholder="🔑 קוד שיתוף משפחתי (למשל: כהן2025)">
        <input type="email" id="email" placeholder="📧 אימייל">
        <input type="password" id="pass" placeholder="🔒 סיסמה">
        <button class="btn btn-primary" id="loginBtn">התחברות / יצירת חשבון</button>
    </div>

    <div id="mainApp" class="hidden">
        <div class="share-header" id="displayGroup"></div>
        <div class="dashboard-grid">
            <div class="card"><div class="section-title">📜 היסטוריה</div><div id="historyList"></div></div>
            <div>
                <button class="btn btn-primary" onclick="openM('catModal')" style="margin-bottom: 20px;">➕ קטגוריה חדשה</button>
                <div id="categoriesList"></div>
            </div>
            <div class="card" style="border-top: 4px solid var(--gift);">
                <div class="section-title">🎁 ארנק גיפטקארד <button onclick="openM('giftModal')" style="border:none; background:none; cursor:pointer;">+</button></div>
                <div id="giftCardsList"></div>
            </div>
        </div>
    </div>
</div>

<div id="expModal" class="modal"><div class="modal-content">
    <h3 id="expTitle">הוצאה</h3>
    <div style="background: #f1f5f9; padding: 10px; border-radius: 15px; margin-bottom: 10px; display: flex; gap: 5px;">
        <input type="number" id="foreignAmt" placeholder="מט"ח" oninput="doConvert()" style="margin:0">
        <select id="currType" onchange="doConvert()" style="width:80px; margin:0"><option value="3.72">$</option><option value="4.05">€</option></select>
    </div>
    <input type="number" id="expAmount" placeholder="סכום ב-₪" style="font-weight:800; text-align:center;">
    <select id="paymentMethod"></select>
    <textarea id="expNotes" placeholder="הערות..."></textarea>
    <input type="hidden" id="activeCatId">
    <button class="btn btn-primary" id="btnSaveTx">שמור</button>
    <button onclick="closeM('expModal')" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">ביטול</button>
</div></div>

<div id="catModal" class="modal"><div class="modal-content">
    <h3>קטגוריה חדשה</h3>
    <input type="text" id="catName" placeholder="שם הקטגוריה">
    <input type="number" id="catBudget" placeholder="תקציב חודשי ₪">
    <button class="btn btn-primary" id="btnSaveCat">שמור</button>
    <button onclick="closeM('catModal')" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">ביטול</button>
</div></div>

<div id="giftModal" class="modal"><div class="modal-content">
    <h3>הוספת גיפטקארד</h3>
    <input type="text" id="giftName" placeholder="שם הכרטיס">
    <input type="number" id="giftBalance" placeholder="סכום ₪">
    <button class="btn btn-gift" id="btnSaveGift">שמור</button>
    <button onclick="closeM('giftModal')" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">ביטול</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, updateDoc, doc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU", authDomain: "expensetrackerpro-d216d.firebaseapp.com", projectId: "expensetrackerpro-d216d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let activeGid = localStorage.getItem('familyCode') || "";
    let allCats = [], allTxs = [], allGifts = [];

    window.openM = (id) => document.getElementById(id).style.display = 'flex';
    window.closeM = (id) => document.getElementById(id).style.display = 'none';
    window.doConvert = () => expAmount.value = Math.round((parseFloat(foreignAmt.value) || 0) * parseFloat(currType.value));

    // טיפול בחיבור
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const mail = email.value, p = pass.value, code = groupCode.value;
        if (!code || !mail || !p) return alert("נא למלא את כל השדות!");
        
        activeGid = code;
        localStorage.setItem('familyCode', code);

        try {
            await signInWithEmailAndPassword(auth, mail, p);
        } catch (e) {
            try {
                await createUserWithEmailAndPassword(auth, mail, p);
                alert("חשבון חדש נוצר עם קוד השיתוף: " + code);
            } catch (err) { alert("שגיאה: " + err.message); }
        }
    });

    document.getElementById('logoutBtn').onclick = () => { signOut(auth); localStorage.removeItem('familyCode'); location.reload(); };

    onAuthStateChanged(auth, u => {
        if(u && activeGid) {
            authSection.classList.add('hidden');
            mainApp.classList.remove('hidden');
            logoutBtn.classList.remove('hidden');
            document.getElementById('displayGroup').innerText = "📍 שיתוף פעיל: " + activeGid;
            sync();
        }
    });

    function sync() {
        onSnapshot(query(collection(db, "categories"), where("groupId", "==", activeGid)), s => { allCats = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
        onSnapshot(query(collection(db, "transactions"), where("groupId", "==", activeGid)), s => { allTxs = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => b.date - a.date); render(); });
        onSnapshot(query(collection(db, "giftcards"), where("groupId", "==", activeGid)), s => { allGifts = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
    }

    document.getElementById('btnSaveCat').onclick = async () => {
        await addDoc(collection(db, "categories"), { name: catName.value, budget: parseFloat(catBudget.value), groupId: activeGid });
        closeM('catModal');
    };

    window.openExpModal = (id, name) => {
        activeCatId.value = id; expTitle.innerText = "הוספה ל: " + name;
        let opts = `<option value="אשראי">💳 אשראי</option><option value="מזומן">💵 מזומן</option>`;
        allGifts.forEach(g => { opts += `<option value="gift_${g.id}">🎁 ${g.name} (₪${g.balance})</option>`; });
        paymentMethod.innerHTML = opts; openM('expModal');
    };

    document.getElementById('btnSaveTx').onclick = async () => {
        const amt = parseFloat(expAmount.value), meth = paymentMethod.value;
        if(meth.startsWith('gift_')) {
            const gId = meth.split('_')[1], g = allGifts.find(x => x.id === gId);
            await updateDoc(doc(db, "giftcards", gId), { balance: g.balance - amt });
        }
        await addDoc(collection(db, "transactions"), { amount: amt, catId: activeCatId.value, method: meth, notes: expNotes.value, groupId: activeGid, date: Timestamp.now() });
        closeM('expModal');
    };

    document.getElementById('btnSaveGift').onclick = async () => {
        await addDoc(collection(db, "giftcards"), { name: giftName.value, balance: parseFloat(giftBalance.value), groupId: activeGid });
        closeM('giftModal');
    };

    function render() {
        categoriesList.innerHTML = allCats.map(c => {
            const spent = allTxs.filter(t => t.catId === c.id).reduce((s,t) => s + t.amount, 0);
            const pct = Math.min((spent / c.budget) * 100, 100);
            return `<div class="category-card" onclick="openExpModal('${c.id}','${c.name}')">
                <div style="display:flex; justify-content:space-between"><strong>${c.name}</strong><span>₪${spent} / ₪${c.budget}</span></div>
                <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:${pct > 90 ? 'var(--danger)' : 'var(--success)'}"></div></div>
            </div>`;
        }).join('');
        historyList.innerHTML = allTxs.slice(0,10).map(t => {
            const cat = allCats.find(c => c.id === t.catId);
            return `<div class="item-row"><div><strong>${cat ? cat.name : 'כללי'}</strong><br><small>${t.method}</small></div><strong style="color:var(--danger)">₪${t.amount}</strong></div>`;
        }).join('');
        giftCardsList.innerHTML = allGifts.map(g => `<div style="display:flex; justify-content:space-between; padding:5px 0;"><span>${g.name}</span><strong>₪${g.balance}</strong></div>`).join('') || 'ריק';
    }
</script>
</body>
</html>
