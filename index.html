<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BudgetMaster Pro - Savings & Goals</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #6366f1; --success: #22c55e; --danger: #ef4444; --bg: #f8fafc; --gift: #ec4899; --fixed: #64748b; --savings: #8b5cf6; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; direction: rtl; color: #1e293b; }
        .container { max-width: 1600px; margin: auto; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        @media (min-width: 1024px) { .dashboard-grid { grid-template-columns: 400px 1fr 300px 300px; } }
        
        .card { background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); margin-bottom: 20px; height: fit-content; }
        .section-title { font-size: 1rem; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }

        .item-card { background: #fff; border-radius: 18px; padding: 15px; border: 1px solid #f1f5f9; margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .progress-bg { background: #f1f5f9; height: 8px; border-radius: 10px; margin: 8px 0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.6s ease; }
        
        .btn { border: none; padding: 12px; border-radius: 14px; cursor: pointer; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; width: 100%; font-size: 14px; }
        .btn-primary { background: var(--primary); }
        .btn-savings { background: var(--savings); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(6px); padding: 15px; }
        .modal-content { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 420px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 14px; font-size: 16px; box-sizing: border-box; }
        
        .hidden { display: none !important; }
        .chart-container { position: relative; height: 180px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
        <h2 style="margin:0; font-weight: 900;">התקציב המשפחתי 💎</h2>
        <button id="logoutBtn" class="hidden" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer;">התנתק</button>
    </div>

    <div id="authSection" class="card" style="max-width: 400px; margin: 40px auto; text-align: center; border: 2px solid var(--primary);">
        <h3>התחברות לשיתוף</h3>
        <input type="text" id="groupCode" placeholder="🔑 קוד שיתוף">
        <input type="email" id="email" placeholder="📧 אימייל">
        <input type="password" id="pass" placeholder="🔒 סיסמה">
        <button class="btn btn-primary" id="loginBtn">התחברות</button>
    </div>

    <div id="mainApp" class="hidden">
        <div style="background: var(--primary); color: white; padding: 10px; border-radius: 12px; text-align: center; margin-bottom: 20px;" id="displayGroup"></div>

        <div class="dashboard-grid">
            <div>
                <div class="card">
                    <div class="section-title">📊 ניתוח חודשי</div>
                    <div class="chart-container"><canvas id="pieChart"></canvas></div>
                    <div class="chart-container" style="margin-top:20px;"><canvas id="lineChart"></canvas></div>
                </div>
                <div class="card">
                    <button onclick="exportToCSV()" class="btn" style="background:#475569;">📥 ייצוא היסטוריה לאקסל</button>
                </div>
            </div>

            <div>
                <div class="card">
                    <div class="section-title">🏷️ הוצאות משתנות <button onclick="openM('catModal')" style="border:none; background:var(--primary); color:white; border-radius:8px; padding:2px 10px;">+</button></div>
                    <div id="categoriesList"></div>
                </div>
            </div>

            <div>
                <div class="card" style="border-top: 4px solid var(--savings);">
                    <div class="section-title">🎯 יעדי חיסכון <button onclick="openM('savingsModal')" style="border:none; background:var(--savings); color:white; border-radius:8px; padding:2px 10px;">+</button></div>
                    <div id="savingsList"></div>
                </div>
            </div>

            <div>
                <div class="card" style="border-top: 4px solid var(--fixed);">
                    <div class="section-title">🏠 קבועות <button onclick="openM('fixedModal')" style="border:none; background:var(--fixed); color:white; border-radius:8px; padding:2px 10px;">+</button></div>
                    <div id="fixedList"></div>
                </div>
                <div class="card" style="border-top: 4px solid var(--gift);">
                    <div class="section-title">🎁 גיפטקארד <button onclick="openM('giftModal')" style="border:none; background:none; color:var(--gift); font-size:20px;">+</button></div>
                    <div id="giftCardsList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="savingsModal" class="modal"><div class="modal-content">
    <h3>יעד חיסכון חדש</h3>
    <input type="text" id="saveName" placeholder="למה חוסכים? (למשל: תאילנד)">
    <input type="number" id="saveTarget" placeholder="סכום יעד ₪">
    <input type="number" id="saveCurrent" placeholder="כמה כבר יש לנו? ₪">
    <button class="btn btn-savings" id="btnSaveGoal">צור יעד</button>
    <button onclick="closeM('savingsModal')" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">ביטול</button>
</div></div>

<div id="addMoneyModal" class="modal"><div class="modal-content">
    <h3>הוספה לחיסכון</h3>
    <input type="number" id="addAmount" placeholder="סכום להוספה ₪">
    <input type="hidden" id="activeGoalId">
    <button class="btn btn-savings" id="btnUpdateSavings">עדכן חיסכון</button>
</div></div>

<div id="expModal" class="modal"><div class="modal-content">
    <h3 id="expTitle">הוצאה</h3>
    <input type="number" id="expAmount" placeholder="סכום ב-₪" style="font-weight:bold; font-size:24px; text-align:center;">
    <select id="paymentMethod"></select>
    <input type="hidden" id="activeCatId">
    <button class="btn btn-primary" id="btnSaveTx">שמור</button>
    <button onclick="closeM('expModal')" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">ביטול</button>
</div></div>

<div id="fixedModal" class="modal"><div class="modal-content">
    <h3>הוצאה קבועה</h3>
    <input type="text" id="fixedName" placeholder="שם (שכירות...)">
    <input type="number" id="fixedAmount" placeholder="סכום ₪">
    <button class="btn btn-primary" id="btnSaveFixed">שמור</button>
</div></div>

<div id="catModal" class="modal"><div class="modal-content">
    <h3>קטגוריה</h3>
    <input type="text" id="catName" placeholder="שם הקטגוריה">
    <input type="number" id="catBudget" placeholder="תקציב יעד ₪">
    <button class="btn btn-primary" id="btnSaveCat">שמור</button>
</div></div>

<div id="giftModal" class="modal"><div class="modal-content">
    <h3>גיפטקארד</h3>
    <input type="text" id="giftName" placeholder="שם">
    <input type="number" id="giftBalance" placeholder="₪">
    <button class="btn" style="background:var(--gift)" id="btnSaveGift">שמור</button>
</div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, onSnapshot, addDoc, updateDoc, doc, Timestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU", authDomain: "expensetrackerpro-d216d.firebaseapp.com", projectId: "expensetrackerpro-d216d" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let activeGid = localStorage.getItem('familyCode') || "";
    let allCats = [], allTxs = [], allGifts = [], allFixed = [], allGoals = [], pieChart = null, lineChart = null;

    window.openM = (id) => document.getElementById(id).style.display = 'flex';
    window.closeM = (id) => document.getElementById(id).style.display = 'none';

    document.getElementById('loginBtn').addEventListener('click', async () => {
        const mail = email.value, p = pass.value, code = groupCode.value;
        if (!code || !mail || !p) return alert("מלא הכל");
        activeGid = code; localStorage.setItem('familyCode', code);
        try { await signInWithEmailAndPassword(auth, mail, p); } catch (e) {
            try { await createUserWithEmailAndPassword(auth, mail, p); } catch(err) { alert(err.message); }
        }
    });

    document.getElementById('logoutBtn').onclick = () => { signOut(auth); localStorage.removeItem('familyCode'); location.reload(); };

    onAuthStateChanged(auth, u => {
        if(u && activeGid) {
            authSection.classList.add('hidden'); mainApp.classList.remove('hidden'); logoutBtn.classList.remove('hidden');
            displayGroup.innerText = "📍 קוד שיתוף: " + activeGid; sync();
        }
    });

    function sync() {
        onSnapshot(query(collection(db, "categories"), where("groupId", "==", activeGid)), s => { allCats = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
        onSnapshot(query(collection(db, "transactions"), where("groupId", "==", activeGid)), s => { allTxs = s.docs.map(d => ({id:d.id, ...d.data()})).sort((a,b) => b.date - a.date); render(); });
        onSnapshot(query(collection(db, "fixed_exp"), where("groupId", "==", activeGid)), s => { allFixed = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
        onSnapshot(query(collection(db, "giftcards"), where("groupId", "==", activeGid)), s => { allGifts = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
        onSnapshot(query(collection(db, "savings_goals"), where("groupId", "==", activeGid)), s => { allGoals = s.docs.map(d => ({id:d.id, ...d.data()})); render(); });
    }

    document.getElementById('btnSaveGoal').onclick = async () => {
        await addDoc(collection(db, "savings_goals"), { name: saveName.value, target: parseFloat(saveTarget.value), current: parseFloat(saveCurrent.value), groupId: activeGid });
        closeM('savingsModal');
    };

    window.openAddMoney = (id) => { activeGoalId.value = id; openM('addMoneyModal'); };

    document.getElementById('btnUpdateSavings').onclick = async () => {
        const goal = allGoals.find(g => g.id === activeGoalId.value);
        await updateDoc(doc(db, "savings_goals", activeGoalId.value), { current: goal.current + parseFloat(addAmount.value) });
        closeM('addMoneyModal');
    };

    // פונקציות שמירה רגילות
    document.getElementById('btnSaveCat').onclick = async () => { await addDoc(collection(db, "categories"), { name: catName.value, budget: parseFloat(catBudget.value), groupId: activeGid }); closeM('catModal'); };
    document.getElementById('btnSaveFixed').onclick = async () => { await addDoc(collection(db, "fixed_exp"), { name: fixedName.value, amount: parseFloat(fixedAmount.value), groupId: activeGid }); closeM('fixedModal'); };
    document.getElementById('btnSaveGift').onclick = async () => { await addDoc(collection(db, "giftcards"), { name: giftName.value, balance: parseFloat(giftBalance.value), groupId: activeGid }); closeM('giftModal'); };

    window.openExpModal = (id, name) => {
        activeCatId.value = id; expTitle.innerText = "הוספה ל: " + name;
        let opts = `<option value="אשראי">💳 אשראי</option><option value="מזומן">💵 מזומן</option>`;
        allGifts.forEach(g => { opts += `<option value="gift_${g.id}">🎁 ${g.name} (₪${g.balance})</option>`; });
        paymentMethod.innerHTML = opts; openM('expModal');
    };

    document.getElementById('btnSaveTx').onclick = async () => {
        const amt = parseFloat(expAmount.value), meth = paymentMethod.value;
        if(meth.startsWith('gift_')) {
            const gId = meth.split('_')[1], g = allGifts.find(x => x.id === gId);
            await updateDoc(doc(db, "giftcards", gId), { balance: g.balance - amt });
        }
        await addDoc(collection(db, "transactions"), { amount: amt, catId: activeCatId.value, method: meth, groupId: activeGid, date: Timestamp.now() });
        closeM('expModal');
    };

    function render() {
        const catStats = allCats.map(c => ({ ...c, spent: allTxs.filter(t => t.catId === c.id).reduce((s,t) => s + t.amount, 0) }));
        const totalFixed = allFixed.reduce((s,f) => s + f.amount, 0);

        categoriesList.innerHTML = catStats.map(c => {
            const pct = Math.min((c.spent / c.budget) * 100, 100);
            return `<div class="item-card" onclick="openExpModal('${c.id}','${c.name}')">
                <div style="display:flex; justify-content:space-between"><strong>${c.name}</strong><span>₪${c.spent} / ₪${c.budget}</span></div>
                <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:${pct > 90 ? 'var(--danger)' : 'var(--success)'}"></div></div>
            </div>`;
        }).join('');

        savingsList.innerHTML = allGoals.map(g => {
            const pct = Math.min((g.current / g.target) * 100, 100);
            return `<div class="item-card" onclick="openAddMoney('${g.id}')">
                <div style="display:flex; justify-content:space-between"><strong>${g.name}</strong><span>₪${g.current} / ₪${g.target}</span></div>
                <div class="progress-bg"><div class="progress-fill" style="width:${pct}%; background:var(--savings)"></div></div>
            </div>`;
        }).join('') || 'אין יעדים';

        fixedList.innerHTML = allFixed.map(f => `<div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px;"><span>${f.name}</span><strong>₪${f.amount}</strong></div>`).join('') || 'ריק';
        giftCardsList.innerHTML = allGifts.map(g => `<div style="display:flex; justify-content:space-between; font-size:13px;"><span>${g.name}</span><strong>₪${g.balance}</strong></div>`).join('') || 'ריק';

        // גרפים
        if(pieChart) pieChart.destroy();
        pieChart = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: { labels: ['קבועות', ...catStats.map(c => c.name)], datasets: [{ data: [totalFixed, ...catStats.map(c => c.spent)], backgroundColor: ['#64748b', '#6366f1', '#22c55e', '#ec4899', '#f59e0b'] }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }
</script>
</body>
</html>
