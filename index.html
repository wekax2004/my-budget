<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BudgetMaster Pro</title>

  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#6366f1">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --primary:#6366f1;
      --bg:#f8fafc;
      --danger:#ef4444;
    }
    body {
      font-family: system-ui, sans-serif;
      background:var(--bg);
      margin:0;
      padding:15px;
      direction: rtl;
    }
    .card {
      background:#fff;
      border-radius:20px;
      padding:20px;
      margin-bottom:15px;
      box-shadow:0 4px 15px rgba(0,0,0,.05);
    }
    .btn {
      width:100%;
      padding:12px;
      border:none;
      border-radius:12px;
      background:var(--primary);
      color:#fff;
      font-weight:bold;
      cursor:pointer;
      margin-top: 5px;
    }
    input {
      width:100%;
      padding:12px;
      border-radius:12px;
      border:1px solid #e5e7eb;
      margin:6px 0;
      box-sizing: border-box;
    }
    #mainApp { display:none; }
    .tx {
      display:flex;
      justify-content:space-between;
      padding:10px;
      border-bottom:1px solid #eee;
    }
    /* תיקון הגודל של הגרף */
    .chart-container {
      position: relative;
      height: 250px; /* הגבלת גובה */
      width: 100%;
    }
  </style>
</head>

<body>

<div id="authScreen" class="card">
  <h2 style="text-align:center">💎 BudgetMaster</h2>
  <input id="email" type="email" placeholder="אימייל">
  <input id="pass" type="password" placeholder="סיסמה">
  <button class="btn" id="loginBtn">התחברות</button>
  <button class="btn" style="background:#94a3b8" id="signupBtn">הרשמה</button>
  <p id="authErr" style="color:red;text-align:center"></p>
</div>

<div id="mainApp">
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3 id="hello" style="margin:0"></h3>
        <button id="logoutBtn" style="color:red;background:none;border:none;cursor:pointer;font-weight:bold;">התנתק</button>
    </div>
  </div>

  <div class="card">
    <h3>📊 סיכום</h3>
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>
  </div>

  <div class="card">
    <h3>➕ הוצאה חדשה</h3>
    <input id="note" placeholder="מה קנית?">
    <input id="amount" type="number" placeholder="₪ סכום">
    <button class="btn" id="addTxBtn">שמור הוצאה</button>
  </div>

  <div class="card">
    <h3>📜 היסטוריה</h3>
    <div id="txList"></div>
  </div>
</div>

<script type="module">
  // ה-Imports חייבים להיות בראש הדף מחוץ לכל פונקציה
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    createUserWithEmailAndPassword, 
    onAuthStateChanged, 
    signOut 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    onSnapshot, 
    query, 
    where, 
    orderBy,
    Timestamp 
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB43p2CQBgAfhs1pDS9nVBM2o5Ty4-3aeU",
    authDomain: "expensetrackerpro-d216d.firebaseapp.com",
    projectId: "expensetrackerpro-d216d"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const authScreen = document.getElementById("authScreen");
  const mainApp    = document.getElementById("mainApp");
  const emailEl    = document.getElementById("email");
  const passEl     = document.getElementById("pass");
  const authErr    = document.getElementById("authErr");
  const hello      = document.getElementById("hello");
  const txList     = document.getElementById("txList");
  const noteEl     = document.getElementById("note");
  const amountEl   = document.getElementById("amount");
  const chartCanvas= document.getElementById("chart");

  let user  = null;
  let txs   = [];
  let chart = null;

  // פונקציות אימות
  async function authAction(type) {
    authErr.innerText = "";
    const email = emailEl.value;
    const pass = passEl.value;
    if(!email || !pass) { authErr.innerText = "נא להזין אימייל וסיסמה"; return; }
    
    try {
      if (type === "login") {
        await signInWithEmailAndPassword(auth, email, pass);
      } else {
        await createUserWithEmailAndPassword(auth, email, pass);
      }
    } catch (e) {
      authErr.innerText = "שגיאה: " + e.message;
    }
  }

  document.getElementById("loginBtn").onclick = () => authAction("login");
  document.getElementById("signupBtn").onclick = () => authAction("signup");
  document.getElementById("logoutBtn").onclick = () => signOut(auth);

  // האזנה למצב המשתמש
  onAuthStateChanged(auth, u => {
    if (!u) {
      authScreen.style.display = "block";
      mainApp.style.display = "none";
      user = null;
    } else {
      user = u;
      authScreen.style.display = "none";
      mainApp.style.display = "block";
      hello.innerText = "שלום, " + u.email.split('@')[0];
      sync();
    }
  });

  // סנכרון מול פיירבייס
  function sync() {
    // הוספתי מיון לפי תאריך כדי שההיסטוריה תהיה מסודרת
    const q = query(collection(db, "transactions"), where("user", "==", user.email), orderBy("date", "desc"));
    onSnapshot(q, snap => {
        txs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        render();
      }, (error) => {
        console.error("שגיאת סנכרון:", error);
      });
  }

  // הוספת הוצאה
  async function addTx() {
    const val = Number(amountEl.value);
    if (!val || val <= 0) return;

    try {
      await addDoc(collection(db, "transactions"), {
        note: noteEl.value || "הוצאה כללית",
        amount: val,
        user: user.email,
        date: Timestamp.now()
      });
      noteEl.value = "";
      amountEl.value = "";
    } catch (e) {
      alert("שגיאה בשמירה: " + e.message);
    }
  }
  document.getElementById("addTxBtn").onclick = addTx;

  // רינדור גרף ורשימה
  function render() {
    // עדכון רשימה
    txList.innerHTML = txs.map(t => `
      <div class="tx">
        <span>${t.note}</span>
        <b>₪${t.amount.toLocaleString()}</b>
      </div>
    `).join("");

    const total = txs.reduce((s, t) => s + t.amount, 0);

    // עדכון גרף
    if (chart) chart.destroy();
    chart = new Chart(chartCanvas, {
      type: "doughnut",
      data: {
        labels: ["סה״כ הוצאות"],
        datasets: [{ 
            data: [total],
            backgroundColor: ['#6366f1'],
            borderWidth: 0
        }]
      },
      options: {
        maintainAspectRatio: false, // מאפשר שליטה בגובה דרך ה-CSS
        plugins: {
            legend: { position: 'bottom' }
        }
      }
    });
  }
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(err => console.log("SW error:", err));
  });
}
</script>

</body>
</html>
